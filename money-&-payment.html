<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money & Payments - OPEN</title>
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
	/* General Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background-color: #9b9b9b; /* Your app's grey background */
    display: flex;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
}

.page-container {
    width: 100%;
    max-width: 500px; /* Limits width on desktop */
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 25px;
}

/* Header */
.header {
    margin-bottom: 20px;
}

.back-btn {
    background: none;
    border: none;
    color: #3e1263; /* Your brand purple */
    font-weight: 700;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

/* Main Content Area */
.content-wrapper {
    flex: 1; /* Takes up remaining space */
    display: flex;
    flex-direction: column;
    justify-content: center; /* Vertical Center */
    align-items: center;    /* Horizontal Center */
    text-align: center;
}

/* Illustration Scaling */
.illustration-box {
    width: 80%;
    max-width: 300px;
    margin-bottom: 40px;
    animation: fadeIn 1s ease-out;
}

.illustration-box svg {
    width: 100%;
    height: auto;
}

/* Typography */
.text-group {
    max-width: 320px;
}

.main-title {
    font-size: 1.7rem;
    font-weight: 800;
    color: #000000;
    margin-bottom: 15px;
}

.description {
    font-size: 1rem;
    line-height: 1.5;
    color: #555555;
    font-weight: 500;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Responsive Scaling for large screens */
@media (min-width: 768px) {
    .page-container {
        max-width: 600px;
    }
    .main-title {
        font-size: 2rem;
    }
    .description {
        font-size: 1.1rem;
    }
}

/* Adjustments for very small screens */
@media (max-height: 600px) {
    .header { margin-bottom: 10px; }
    .illustration-box { width: 60%; margin-bottom: 20px; }
    .main-title { font-size: 1.4rem; }
}
    </style>
</head>
<body>

    <div class="page-container">
        <!-- Header -->
        <header class="header">
            <button class="back-btn" onclick="window.location.href = 'settings.html'">
                <i class="ph ph-caret-left"></i> Money & Payment Options
            </button>
        </header>

        <!-- Main Content -->
        <main class="content-wrapper">
            <!-- Illustration Container -->
            <div class="illustration-box">
                <!-- Using a descriptive SVG to match your image -->
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="80" fill="rgba(0,0,0,0.05)" />
                    <!-- Question Mark Symbol -->
                    <text x="50%" y="60%" text-anchor="middle" font-size="100" fill="#a04040" font-weight="bold">?</text>
                    <!-- Thought Bubble -->
                    <path d="M140 50 Q160 30 180 50 T160 70 Q140 90 120 70" fill="#ccc" />
                </svg>
            </div>

            <div class="text-group">
                <h1 class="main-title">Feature not available</h1>
                <p class="description">
                    Complete your verification to get access to this feature and our other tools
                </p>
            </div>
        </main>
    </div>

    <script>
        // Simple back navigation
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
