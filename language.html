<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Settings</title>
    <!-- Using Phosphor Icons for the back arrow -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

/* General Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: #ffffff; /* Matches your UI background */
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

/* Responsive Container */
.app-container {
    width: 100%;
    max-width: 500px; /* Limits width on desktop */
    height: 100vh;
    background-color: #ffffff;
    display: flex;
    flex-direction: column;
    padding: 40px 20px;
}

/* Header / Back Link */
.header {
    margin-bottom: 40px;
}

.back-link {
    text-decoration: none;
    color: #500e8c; /* Purple color from image */
    font-weight: 700;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Language List */
.language-list {
    flex: 1; /* Pushes footer to bottom */
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

.lang-item {
    width: 100%;
    max-width: 320px;
    padding: 18px 0;
    text-align: center;
    font-size: 18px;
    color: #666; /* Gray for inactive */
    border-bottom: 1px solid #777; /* Divider line */
    cursor: pointer;
    transition: all 0.2s ease;
}

/* Active State */
.lang-item.active {
    color: #000;
    font-weight: 700;
}

/* Footer / Save Button */
.footer {
    display: flex;
    justify-content: center;
    padding-bottom: 20px;
    border-bottom: none; 
}

.save-btn {
    background-color: #500e8c;
    color: white;
    border: none;
    padding: 14px 70px;
    border-radius: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
}

.save-btn:active {
    opacity: 0.8;
}

/* Responsive tweaks for very small screens */
@media (max-height: 600px) {
    .header { margin-bottom: 20px; }
    .lang-item { padding: 12px 0; }
}
</style>
</head>
<body>

    <div class="app-container">
        <!-- Top Navigation -->
        <header class="header">
            <a href="settings.html" class="back-link" onclick="window.history.back()">
                <i class="ph ph-caret-left"></i> Language
            </a>
        </header>

        <!-- Language Selection List -->
        <main class="language-list">
            <div class="lang-item active" data-lang="English">English</div>
            <div class="lang-item" data-lang="French">French</div>
            <div class="lang-item" data-lang="Spanish">Spanish</div>
            <div class="lang-item" data-lang="German">German</div>
            <div class="lang-item" data-lang="Mandarin">Mandarin</div>
            <div class="lang-item" data-lang="Latin">Latin</div>
        </main>

        <!-- Footer Area with Save Button -->
        <footer class="footer">
            <button class="save-btn" id="saveBtn">Save</button>
        </footer>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
    const langItems = document.querySelectorAll('.lang-item');
    const saveBtn = document.getElementById('saveBtn');
    let selectedLanguage = "English"; // Default

    // Handle Language Selection
    langItems.forEach(item => {
        item.addEventListener('click', () => {
            // Remove active class from all
            langItems.forEach(i => i.classList.remove('active'));
            
            // Add active class to clicked item
            item.classList.add('active');
            
            // Update variable
            selectedLanguage = item.getAttribute('data-lang');
            console.log("Selected:", selectedLanguage);
        });
    });

    // Handle Save Button
    saveBtn.addEventListener('click', () => {
        alert("Language saved as: " + selectedLanguage);
        // Here you would typically send data to your server
    });
});
</script>
</body>
</html>
