<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <link rel="stylesheet" href="style.css">
      <title>Open Jobs Ghana | Sign Up</title>
</head>
<body>
  <div class="login-page">
    <form class="login-card" action="#" method="post" id="signup-page">
      <div class="brand-header">
        <img src="icons/Open Logo.png" alt="Open logo" class="brand-logo">
        <h1>OPEN</h1>
      </div>
      <p class="subtitle">Join Open and get started with your work</p>
      <input id="fullname" type="text" name="fullname" placeholder="Full Name" required>
      <input id="email" type="email" name="email" placeholder="Email Address" required>
      <input id="password" type="password" name="password" placeholder="Create Password" required>
      <input id="confirm-password" type="password" name="confirm_password" placeholder="Confirm Password" required>

      <div class="error-message" id="passwordError">
        ❌ Password must start with capital letter, contain special character (@#$%!&*), and end with 1-2 numbers
      </div>

      <button type="submit" class="primary-btn">Create Account</button>
      <div class="divider"><span>or continue with:</span></div>

      <div class="social-options">
          <button type="button" class="social-btn"><img src="icons/google icon.svg" alt="Google"></button>
          <button type="button" class="social-btn"><img src="icons/Email Icon.svg" alt="Email"></button>
          <button type="button" class="social-btn"><img src="icons/Phone Icon.svg" alt="Phone"></button>
      </div>

      <p class="switch-text">Already have an account? <a href="login.html">Sign In</a></p>
    </form>
  </div>
</body>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // 1. Password Toggle Logic (Your existing code)
    const passwordInputs = document.querySelectorAll('input[type="password"]');
    passwordInputs.forEach((input) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'password-wrapper';
        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);
        const toggleBtn = document.createElement('button');
        toggleBtn.type = 'button';
        toggleBtn.className = 'toggle-password';
        toggleBtn.innerHTML = '<img src="icons/eye.png" alt="Show password">';
        wrapper.appendChild(toggleBtn);
        toggleBtn.addEventListener('click', function() {
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            this.innerHTML = `<img src="${type === 'password' ? 'icons/eye.png' : 'icons/invisible.png'}" alt="toggle">`;
        });
    });

    // 2. Password Validation Function (Your existing code)
    function validatePassword(password) {
        return (
            /^[A-Z]/.test(password) &&
            /[@#$%!&*]/.test(password) &&
            /[0-9]{1,2}$/.test(password) &&
            password.length >= 8
        );
    }

    const form = document.getElementById('signup-page');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const emailInput = document.getElementById('email');
    const nameInput = document.getElementById('fullname');
    const errorMessage = document.getElementById('passwordError');

    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // STOP form from reloading page

            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const email = emailInput.value.trim().toLowerCase(); // Normalize email
            const fullname = nameInput.value.trim();

            // Check Validation
            if (!validatePassword(password)) {
                errorMessage.style.display = 'block';
                return;
            }

            // Check if passwords match
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // --- START OF DATA SAVING LOGIC ---
            
            // A. Get existing users or create empty list
            const STORAGE_KEY = "OPEN_USER_RECORDS";
            const SESSION_KEY = "OPEN_ACTIVE_SESSION";
            
            let users = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

            // B. Check if email already exists
            if (users.some(u => u.email === email)) {
                alert("This email is already registered. Try logging in.");
                return;
            }

            // C. Create new user object
            const newUser = {
                name: fullname,
                email: email,
                password: password,
                username: "",      // Empty for now, user adds in Account page
                profilePic: null   // Placeholder for profile pic
            };

            // D. Save to "Database"
            users.push(newUser);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));

            // E. Set "Active Session" (This tells Account.html who is logged in)
            localStorage.setItem(SESSION_KEY, JSON.stringify({ email: email }));

            // --- END OF DATA SAVING LOGIC ---

            // Redirect to Onboarding
            window.location.href = 'onbording1.html';
        });
    }

    // Live validation feedback
    passwordInput.addEventListener('input', function() {
        if (this.value && !validatePassword(this.value)) {
            this.classList.add('invalid');
            errorMessage.style.display = 'block';
        } else {
            this.classList.remove('invalid');
            errorMessage.style.display = 'none';
        }
    });
});
</script>
</html>
