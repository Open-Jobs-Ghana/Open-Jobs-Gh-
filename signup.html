<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <link rel="stylesheet" href="style.css">
      <script src="api.js"></script>
      <script src="https://accounts.google.com/gsi/client" async defer></script>
      <title>Open Jobs Ghana | Sign Up</title>
      <style>
        .google-btn {
          display: flex;
          width: 100%;
          align-items: center;
          justify-content: center;
          gap: 12px;
          background: #ffffff;
          color: #1f1f1f;
          border: 1px solid #dadce0;
          border-radius: 10px;
          padding: 12px 16px;
          font-size: 0.95rem;
          font-weight: 600;
          cursor: pointer;
          font-family: inherit;
        }
        .google-btn:hover { background: #f7f7f8; }
        .google-btn:active { transform: scale(0.98); }
        .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
      </style>
</head>
<body>

<script>
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark-theme');
    }
</script>

  <div class="login-page">
    <form class="login-card" action="#" method="post" id="signup-page">
      <div class="brand-header">
        <img src="icons/Open Logo.png" alt="Open logo" class="brand-logo">
        <h1>OPEN</h1>
      </div>
      <p class="subtitle">Join Open and get started with your work</p>
      <input id="fullname" type="text" name="fullname" placeholder="Full Name" required>
      <input id="username" type="text" name="username" placeholder="Username" required>
      <input id="email" type="email" name="email" placeholder="Email Address" required>
      <input id="password" type="password" name="password" placeholder="Create Password" required>
    
      <input id="confirm-password" type="password" name="confirm_password" placeholder="Confirm Password" required>

      <div class="error-message" id="usernameError" style="display: none; color: red;">
        ❌ That username is already taken.
      </div>

      <div class="error-message" id="passwordError">
        ❌ Password must be at least 8 characters and include a mix of at least 1 capital letter, 1 special character (@#$%!&*), and 1 number.
      </div>

      <div class="error-message" id="matchError" style="display: none; color: red;">
        ❌ Passwords do not match!
      </div>

      <button type="submit" class="primary-btn">Create Account</button>
      <div class="divider"><span>or</span></div>

      <button type="button" class="google-btn" id="googleSignupBtn">
          <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
          <span>Continue with Google</span>
      </button>

      <p class="switch-text">Already have an account? <a href="login.html">Sign In</a></p>
    </form>
  </div>
</body>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // 1. Password Toggle Logic (Your existing code)
    const passwordInputs = document.querySelectorAll('input[type="password"]');
    passwordInputs.forEach((input) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'password-wrapper';
        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);
        const toggleBtn = document.createElement('button');
        toggleBtn.type = 'button';
     
        toggleBtn.className = 'toggle-password';
        toggleBtn.innerHTML = '<img src="icons/eye.png" alt="Show password">';
        wrapper.appendChild(toggleBtn);
        toggleBtn.addEventListener('click', function() {
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            this.innerHTML = `<img src="${type === 'password' ? 'icons/eye.png' : 'icons/invisible.png'}" alt="toggle">`;
        });
    });

    // 2. Password Validation Function — shared with account.html via api.js,
    // so the rule can never drift out of sync between the two pages.
    const validatePassword = OpenAPI.validatePassword;

    const form = document.getElementById('signup-page');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const emailInput = document.getElementById('email');
    const usernameInput = document.getElementById('username');
    const nameInput = document.getElementById('fullname');
    const errorMessage = document.getElementById('passwordError');
    const matchErrorMessage = document.getElementById('matchError');
    const usernameErrorMessage = document.getElementById('usernameError');

    if (form) {
        form.addEventListener('submit', async function(e) {
            e.preventDefault(); // STOP form from reloading page

            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const email = emailInput.value.trim().toLowerCase(); // Normalize email
            const username = usernameInput.value.trim();
            const fullname = nameInput.value.trim();

            usernameErrorMessage.style.display = 'none';

            // Check Validation
            if (!validatePassword(password)) {
                errorMessage.style.display = 'block';
                return;
            }

            // Check if passwords match
            if (password !== confirmPassword) {
                matchErrorMessage.style.display = 'block';
                return;
            }

            // Delegate to the shared registration logic in api.js. This
            // checks for a duplicate email/username and saves the new user
            // record — the exact same logic other pages (login, account,
            // settings) rely on.
            const result = OpenAPI.registerUser({ name: fullname, email: email, username: username, password: password });

            if (!result.ok && result.reason === 'email_exists') {
                await OpenAPI.showAlert("This email is already registered. Try logging in.", { title: "Email already registered" });
                return;
            }

            if (!result.ok && result.reason === 'username_exists') {
                usernameErrorMessage.style.display = 'block';
                usernameInput.focus();
                return;
            }

            // Redirect to Onboarding
            window.location.href = 'onbording.html';
        });
    }

    // Helper function to check matching passwords live
    function checkPasswordMatch() {
        if (confirmPasswordInput.value && passwordInput.value !== confirmPasswordInput.value) {
            confirmPasswordInput.classList.add('invalid');
            matchErrorMessage.style.display = 'block';
        } else {
            confirmPasswordInput.classList.remove('invalid');
            matchErrorMessage.style.display = 'none';
        }
    }

    // Live validation feedback for requirements
    passwordInput.addEventListener('input', function() {
        if (this.value && !validatePassword(this.value)) {
            this.classList.add('invalid');
            errorMessage.style.display = 'block';
        } else {
            this.classList.remove('invalid');
            errorMessage.style.display = 'none';
        }
        // Also update match error state if user goes back to change main password
        checkPasswordMatch();
    });

    // Live validation feedback for confirming password match
    confirmPasswordInput.addEventListener('input', checkPasswordMatch);

    // ----------------------------------------------------------------
    // GOOGLE SIGN-IN — same wiring as login.html. See that file's
    // comment above GOOGLE_CLIENT_ID for setup instructions; the two
    // pages currently each hold their own copy of this Client ID
    // constant, so update both if it ever changes.
    const GOOGLE_CLIENT_ID = "YOUR_CLIENT_ID_HERE.apps.googleusercontent.com";

    let googleTokenClient = null;
    const googleBtn = document.getElementById('googleSignupBtn');

    function initGoogleAuth() {
        if (!window.google || !google.accounts || !google.accounts.oauth2) {
            setTimeout(initGoogleAuth, 300);
            return;
        }
        googleTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'openid email profile',
            callback: handleGoogleTokenResponse
        });
    }

    async function handleGoogleTokenResponse(tokenResponse) {
        if (!tokenResponse || tokenResponse.error) {
            await OpenAPI.showAlert("Google sign-in was cancelled or didn't complete. Please try again.", { title: "Couldn't sign in" });
            resetGoogleButton();
            return;
        }

        try {
            const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
            });
            if (!res.ok) throw new Error('userinfo request failed');
            const profile = await res.json();

            const result = OpenAPI.loginOrRegisterWithGoogle(profile);
            // Someone who already has an account and hits "Continue with
            // Google" from the Sign Up page is really just logging in.
            window.location.href = result.isNewUser ? 'onbording.html' : 'home.html';
        } catch (err) {
            await OpenAPI.showAlert("Something went wrong finishing Google sign-in. Please try again.", { title: "Couldn't sign in" });
            resetGoogleButton();
        }
    }

    function resetGoogleButton() {
        googleBtn.disabled = false;
        googleBtn.querySelector('span').innerText = 'Continue with Google';
    }

    googleBtn.addEventListener('click', () => {
        if (!googleTokenClient) {
            initGoogleAuth();
            OpenAPI.showAlert("Still connecting to Google — please try again in a moment.", { title: "One sec" });
            return;
        }
        googleBtn.disabled = true;
        googleBtn.querySelector('span').innerText = 'Connecting…';
        googleTokenClient.requestAccessToken();
        setTimeout(resetGoogleButton, 4000);
    });

    initGoogleAuth();
});
</script>
</html>
