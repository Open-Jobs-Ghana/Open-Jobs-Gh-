<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <link rel="stylesheet" href="style.css">
      <title>Sign Up | Open</title>
</head>
<body>
  <div class="login-page">
    <form class="login-card" action="#" method="post" id="signup-page">
      <div class="brand-header">
        <img src="icons/Open Logo.png" alt="Open logo" class="brand-logo">
        <h1>OPEN</h1>
      </div>
      <p class="subtitle">Join Open and get started with your work</p>
      <input id="fullname" type="text" name="fullname" placeholder="Full Name" required>
      <input id="email" type="email" name="email" placeholder="Email Address" required>
      <input id="password" type="password" name="password" placeholder="Create Password" required>
      <input id="confirm-password" type="password" name="confirm_password" placeholder="Confirm Password" required>

      <div class="error-message" id="passwordError">
        ❌ Password must start with capital letter, contain special character (@#$%!&*), and end with 1-2 numbers
      </div>

      <button type="submit" class="primary-btn">Create Account</button>
      <div class="divider"><span>or continue with:</span></div>

      <div class="social-options">
          <button type="button" class="social-btn"><img src="icons/google icon.svg" alt="Google"></button>
          <button type="button" class="social-btn"><img src="icons/Email Icon.svg" alt="Email"></button>
          <button type="button" class="social-btn"><img src="icons/Phone Icon.svg" alt="Phone"></button>
      </div>

      <p class="switch-text">Already have an account? <a href="login.html">Sign In</a></p>
    </form>
  </div>
</body>

<script>
  document.addEventListener('DOMContentLoaded', function() {
        // Find all password inputs
      const passwordInputs = document.querySelectorAll('input[type="password"]');
        
      passwordInputs.forEach((input, index) => {
      // Create wrapper div
      const wrapper = document.createElement('div');
      wrapper.className = 'password-wrapper';
          
      // Wrap the input
      input.parentNode.insertBefore(wrapper, input);
      wrapper.appendChild(input);
          
      // Create toggle button
      const toggleBtn = document.createElement('button');
      toggleBtn.type = 'button';
      toggleBtn.className = 'toggle-password';
      toggleBtn.setAttribute('aria-label', 'Show password');
      toggleBtn.innerHTML = '<img src="icons/eye.png" alt="Show password">';
          
      wrapper.appendChild(toggleBtn);
          
      // Add click handler
      toggleBtn.addEventListener('click', function() {
      const type = input.type === 'password' ? 'text' : 'password';
      input.type = type;
      const iconSrc = type === 'password' ? 'icons/eye.png' : 'icons/invisible.png';
      const ariaLabel = type === 'password' ? 'Show password' : 'Hide password';
      this.setAttribute('aria-label', ariaLabel);
      this.innerHTML = `<img src="${iconSrc}" alt="${ariaLabel}">`;
      });
   });
});


     // Password validation function
  function validatePassword(password) {
    return (
      /^[A-Z]/.test(password) &&           // Starts with capital letter
      /[@#$%!&*]/.test(password) &&        // Contains special character
      /[0-9]{1,2}$/.test(password) &&      // Ends with 1-2 numbers
      password.length >= 8                  // Minimum length
    );
  }
  
  const form = document.getElementById('signup-page');
  const passwordInput = document.getElementById('password');
  const errorMessage = document.getElementById('passwordError');
  
  if (form) {
    form.addEventListener('submit', function(e) {
      const password = passwordInput.value;
      
      if (!validatePassword(password)) {
        e.preventDefault(); // STOP form submission
        errorMessage.style.display = 'block';
        passwordInput.classList.add('invalid');
        passwordInput.focus();
        return false;
      }

      e.preventDefault();
      window.location.href = 'onbording1.html';
    });
  }
  
  passwordInput.addEventListener('input', function() {
    const password = this.value;
    
    if (password && !validatePassword(password)) {
      this.classList.add('invalid');
      errorMessage.style.display = 'block';
    } else {
      this.classList.remove('invalid');
      errorMessage.style.display = 'none';
    }
  });
</script>
</html>
