<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Page Selection with Dots Indicator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #app {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            min-height: 500px;
        }

        /* Dots Indicator Container */
        .dots-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ddd;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            background-color: #500E8C;
            transform: scale(1.2);
        }

        .dot.visited {
            background-color: #500E8C;
        }

        /* Page Content */
        .page-content {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .page-description {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Selection Options */
        .selection-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            background: white;
        }

        .option:hover {
            background-color: #f5f5f5;
            border-color: #500E8C;
            transform: translateX(5px);
        }

        .option.selected {
            background-color: #500E8C;
            color: white;
            border-color: #500E8C;
            box-shadow: 0 4px 15px rgba(80, 14, 140, 0.3);
        }

        /* Navigation Buttons */
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-next {
            background-color: #500E8C;
            color: white;
            flex: 1;
        }

        .btn-next:hover {
            background-color: #3a0a66;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(80, 14, 140, 0.4);
        }

        .btn-back {
            background-color: #6c757d;
            color: white;
            flex: 1;
        }

        .btn-back:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
        }

        .btn-submit {
            background-color: #28a745;
            color: white;
            flex: 1;
        }

        .btn-submit:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        /* Summary Page */
        .summary-container {
            margin: 30px 0;
        }

        .summary-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #500E8C;
        }

        .summary-label {
            font-weight: bold;
            color: #500E8C;
            margin-bottom: 5px;
        }

        .summary-value {
            color: #333;
            font-size: 18px;
        }

        .empty-selection {
            color: #999;
            font-style: italic;
        }

        .reset-btn {
            background-color: #dc3545;
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        .reset-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        let currentPage = 1;
        let selections = {
            page1: null,  // Favorite Programming Language
            page2: null,  // Favorite Framework
            page3: null,  // Preferred Database
            page4: null,  // Years of Experience
            page5: null,  // Preferred Role
            page6: null   // Remote Preference
        };

        // Page configurations
        const pages = {
            1: {
                title: "Favorite Programming Language",
                description: "Select the language you love most",
                options: [
                    { value: "javascript", label: "⚡ JavaScript" },
                    { value: "python", label: "🐍 Python" },
                    { value: "java", label: "☕ Java" },
                    { value: "cpp", label: "🚀 C++" },
                    { value: "rust", label: "🦀 Rust" }
                ]
            },
            2: {
                title: "How did you find out about OPEN?",
                options: [
                    { value: "react", label: "Family or friend" },
                    { value: "vue", label: "Flyer/ad/post" },
                    { value: "angular", label: "Social media" },
                    { value: "svelte", label: "Google search/ Ai search" },
                    { value: "django", label: "Other" }
                ]
            },
            3: {
                title: "What brings you here today?",
                description: "Choose your go-to database",
                options: [
                    { value: "postgresql", label: "I'm looking for a job" },
                    { value: "mysql", label: "I'm looking to hire talent" },
                    { value: "mongodb", label: "I'm just exploring" },
                ]
            },
            4: {
                title: "Which field are you most interested in? ",
                description: "How long have you been coding?",
                options: [
                    { value: "0-1", label: "Healthcare" },
                    { value: "1-3", label: "Business & Finance" },
                    { value: "3-5", label: "Agriculture" },
                    { value: "5-10", label: "Engineering" },
                    { value: "10+", label: "Transport" }
                ]
            },
            5: {
                title: "",
                description: "What's your ideal position?",
                options: [
                    { value: "frontend", label: "🎨 Frontend Developer" },
                    { value: "backend", label: "⚙️ Backend Developer" },
                    { value: "fullstack", label: "🔄 Fullstack Developer" },
                    { value: "devops", label: "🚀 DevOps Engineer" },
                    { value: "mobile", label: "📱 Mobile Developer" }
                ]
            },
            6: {
                title: "Remote Work Preference",
                description: "What's your preferred work arrangement?",
                options: [
                    { value: "fully-remote", label: "🏠 Fully Remote" },
                    { value: "hybrid", label: "🏢 Hybrid" },
                    { value: "onsite", label: "🏭 On-site" },
                    { value: "flexible", label: "🕒 Flexible" }
                ]
            }
        };

        function renderDots() {
            const dotsContainer = document.querySelector('.dots-container');
            if (!dotsContainer) return;
            
            dotsContainer.innerHTML = '';
            
            for (let i = 1; i <= 6; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                
                // Determine dot color based on visited status
                if (selections[`page${i}`] || i < currentPage) {
                    dot.classList.add('visited');
                }
                if (i === currentPage) {
                    dot.classList.add('active');
                }
                
                // Add click event to navigate to that page
                dot.addEventListener('click', () => {
                    if (i <= currentPage || selections[`page${i-1}`]) {
                        currentPage = i;
                        renderPage(currentPage);
                    }
                });
                
                dotsContainer.appendChild(dot);
            }
        }

        function selectOption(page, value) {
            selections[page] = value;
            
            // Remove highlight from all options in this page
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // Highlight the selected option
            const selectedElement = document.getElementById(`opt-${page}-${value}`);
            if (selectedElement) {
                selectedElement.classList.add('selected');
            }
            
            // Update dots to show this page as visited
            renderDots();
        }

        function nextPage() {
            const currentPageKey = `page${currentPage}`;
            
            // Check if current page has a selection
            if (currentPage <= 6 && !selections[currentPageKey]) {
                alert(`Please make a selection on Page ${currentPage} before continuing`);
                return;
            }
            
            if (currentPage < 6) {
                currentPage++;
                renderPage(currentPage);
            } else if (currentPage === 6) {
                // Submit and show summary
                renderSummary();
            }
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
            }
        }

        function renderSummary() {
            const container = document.getElementById('app');
            container.innerHTML = `
                <div class="dots-container"></div>
                <div class="page-content">
                    <h1>📋 Your Selections Summary</h1>
                    <p class="page-description">Review your choices before submitting</p>
                    
                    <div class="summary-container">
                        <div class="summary-item">
                            <div class="summary-label">Programming Language:</div>
                            <div class="summary-value">${getOptionLabel(1, selections.page1) || '<span class="empty-selection">Not selected</span>'}</div>
                        </div>
                        
                        <div class="summary-item">
                            <div class="summary-label">Framework:</div>
                            <div class="summary-value">${getOptionLabel(2, selections.page2) || '<span class="empty-selection">Not selected</span>'}</div>
                        </div>
                        
                        <div class="summary-item">
                            <div class="summary-label">Database:</div>
                            <div class="summary-value">${getOptionLabel(3, selections.page3) || '<span class="empty-selection">Not selected</span>'}</div>
                        </div>
                        
                        <div class="summary-item">
                            <div class="summary-label">Experience:</div>
                            <div class="summary-value">${getOptionLabel(4, selections.page4) || '<span class="empty-selection">Not selected</span>'}</div>
                        </div>
                        
                        <div class="summary-item">
                            <div class="summary-label">Role:</div>
                            <div class="summary-value">${getOptionLabel(5, selections.page5) || '<span class="empty-selection">Not selected</span>'}</div>
                        </div>
                        
                        <div class="summary-item">
                            <div class="summary-label">Work Preference:</div>
                            <div class="summary-value">${getOptionLabel(6, selections.page6) || '<span class="empty-selection">Not selected</span>'}</div>
                        </div>
                    </div>
                    
                    <div class="navigation-buttons">
                        <button class="btn-back" onclick="previousPage()">◀ Back to Page 6</button>
                        <button class="btn-submit" onclick="submitForm()">✅ Submit Answers</button>
                    </div>
                    <button class="reset-btn" onclick="resetQuiz()">🔄 Start Over</button>
                </div>
            `;
            renderDots();
        }

        function getOptionLabel(pageNum, value) {
            if (!value) return null;
            const options = pages[pageNum].options;
            const option = options.find(opt => opt.value === value);
            return option ? option.label : value;
        }

        function submitForm() {
            alert(`Thank you for completing the survey!\n\nYour selections have been saved:\n` +
                  `Language: ${getOptionLabel(1, selections.page1)}\n` +
                  `Framework: ${getOptionLabel(2, selections.page2)}\n` +
                  `Database: ${getOptionLabel(3, selections.page3)}\n` +
                  `Experience: ${getOptionLabel(4, selections.page4)}\n` +
                  `Role: ${getOptionLabel(5, selections.page5)}\n` +
                  `Work: ${getOptionLabel(6, selections.page6)}`);
            
            console.log('Final Selections:', selections);
        }

        function resetQuiz() {
            selections = {
                page1: null, page2: null, page3: null,
                page4: null, page5: null, page6: null
            };
            currentPage = 1;
            renderPage(1);
        }

        function renderPage(pageNumber) {
            const container = document.getElementById('app');
            const pageData = pages[pageNumber];
            
            if (!pageData) return;
            
            // Generate options HTML
            const optionsHTML = pageData.options.map(option => `
                <div onclick="selectOption('page${pageNumber}', '${option.value}')" 
                     class="option" 
                     id="opt-page${pageNumber}-${option.value}">
                    ${option.label}
                </div>
            `).join('');
            
            // Generate navigation buttons
            let navigationHTML = '';
            if (pageNumber === 6) {
                navigationHTML = `
                    <div class="navigation-buttons">
                        <button class="btn-back" onclick="previousPage()">◀ Back</button>
                        <button class="btn-submit" onclick="nextPage()">Submit & Review ▶</button>
                    </div>
                `;
            } else {
                navigationHTML = `
                    <div class="navigation-buttons">
                        ${pageNumber > 1 ? '<button class="btn-back" onclick="previousPage()">◀ Back</button>' : '<div></div>'}
                        <button class="btn-next" onclick="nextPage()">Next ▶</button>
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="dots-container"></div>
                <div class="page-content">
                    <h1>${pageData.title}</h1>
                    <p class="page-description">${pageData.description}</p>
                    <div class="selection-group">
                        ${optionsHTML}
                    </div>
                    ${navigationHTML}
                </div>
            `;
            
            // Highlight the previously selected option if exists
            const selectedValue = selections[`page${pageNumber}`];
            if (selectedValue) {
                const selectedElement = document.getElementById(`opt-page${pageNumber}-${selectedValue}`);
                if (selectedElement) {
                    selectedElement.classList.add('selected');
                }
            }
            
            renderDots();
        }
        
        // Initialize the app
        renderPage(1);
    </script>
</body>
</html>
