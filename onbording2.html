<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Onboarding Page | Open</title>
      <style>
            :root {
                  color-scheme: light;
                  --page-bg: #F6ECEA;
                  --primary: #500E8C;
                  --option-bg: #F6ECEA;
                  --option-text: #500E8C;
                  --button-radius: 24px;
            }

            * {
                  box-sizing: border-box;
            }

            html, body {
                  margin: 0;
                  min-height: 100vh;
                  background: var(--page-bg);
                  font-family: 'Poppins', sans-serif;
                  color: var(--primary);
            }

            body {
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 24px;
            }

            .section1 {
                  width: min(100%, 520px);
                  background: #ffffff;
                  border-radius: 32px;
                  padding: 32px 28px;
                  box-shadow: 0 20px 60px rgba(80, 14, 140, 0.12);
            }

            .section1 h1 {
                  margin: 0 0 24px;
                  font-size: 28px;
                  line-height: 1.2;
                  letter-spacing: 0.1em;
            }

            .options {
                  display: grid;
                  gap: 16px;
                  margin-bottom: 28px;
            }

            .option-btn {
                  width: 100%;
                  text-align: left;
                  padding: 18px 20px;
                  border-radius: var(--button-radius);
                  border: 1px solid rgba(80, 14, 140, 0.25);
                  background: var(--option-bg);
                  color: var(--option-text);
                  font-size: 16px;
                  cursor: pointer;
                  position: relative;
                  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            }

            .option-btn::before {
                  content: '';
                  width: 14px;
                  height: 14px;
                  border-radius: 50%;
                  border: 2px solid var(--primary);
                  position: absolute;
                  top: 50%;
                  right: 20px;
                  transform: translateY(-50%);
            }

            .option-btn.selected {
                  background: var(--primary);
                  color: #ffffff;
                  border-color: var(--primary);
            }

            .option-btn.selected::before {
                  background: #ffffff;
                  border-color: #ffffff;
            }

            .option-btn:hover {
                  transform: translateY(-1px);
                  box-shadow: 0 12px 24px rgba(80, 14, 140, 0.12);
            }

            .next-row {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  gap: 16px;
                  flex-wrap: wrap;
            }

            .progress-dots {
                  display: flex;
                  gap: 10px;
                  align-items: center;
                  justify-content: center;
                  margin-top: 8px;
                  width: 100%;
            }

            .progress-dot {
                  width: 12px;
                  height: 12px;
                  border-radius: 50%;
                  background: rgba(80, 14, 140, 0.15);
            }

            .progress-dot.active {
                  background: var(--primary);
            }

            .next-btn {
                  border: none;
                  border-radius: 999px;
                  padding: 16px 28px;
                  background: var(--primary);
                  color: #ffffff;
                  font-size: 16px;
                  font-weight: 700;
                  cursor: pointer;
                  min-width: 150px;
            }

            @media (max-width: 480px) {
                  body {
                        padding: 16px;
                  }

                  .section1 {
                        padding: 24px 20px;
                  }

                  .next-row {
                        flex-direction: column;
                        align-items: stretch;
                  }

                  .next-btn {
                        width: 100%;
                        min-width: 0;
                  }
            }
      </style>
</head>
<body>
      <div class="section1">
            <h1>How did you find out about OPEN?</h1>
            <div class="options">
                  <button type="button" class="option-btn selected">Family or friend</button>
                  <button type="button" class="option-btn">Flyer/ad/post</button>
                  <button type="button" class="option-btn">Social media</button>
                  <button type="button" class="option-btn">Google search/Ai search</button>
                  <button type="button" class="option-btn">Other</button>
            </div>
            <div class="next-row">
                  <div class="progress-dots" aria-label="Onboarding progress">
                        <span class="progress-dot active"></span>
                        <span class="progress-dot"></span>
                        <span class="progress-dot"></span>
                        <span class="progress-dot"></span>
                        <span class="progress-dot"></span>
                  </div>
                  <button type="button" class="next-btn">Next</button>
            </div>
      </div>
      <script>
            const optionButtons = document.querySelectorAll('.option-btn');
            optionButtons.forEach((button) => {
                  button.addEventListener('click', () => {
                        optionButtons.forEach((item) => item.classList.remove('selected'));
                        button.classList.add('selected');
                  });
            });
      </script>
</body>
</html>
