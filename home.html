<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Jobs Ghana</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Instant Dark Mode Switch Check to Prevent Flashing -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
    
    <style>
        /* --- CORE CONFIGURATION & MATERIAL SYSTEM --- */
        :root {
            --purple-main: #500e8c;
            --purple-text-title: #500e8c;
            --bg-light: #ffffff;
            --bg-search: #f1f2f6;
            --text-dark: #1a1a1a;
            --text-muted: #8e8e93;
            --border-card: #f2f2f7;
            --shadow-card: rgba(0, 0, 0, 0.06);
            --screen-edge-margin: 16px;
            --card-sub-bg: #ffffff;
            --badge-text-fallback: #1c1c1e;
            --badge-bg-fallback: #e5e5ea;
            --list-row-icon-bg: #f4ebfc;
        }

        .dark-theme {
            --purple-main: #a370db;
            --purple-text-title: #c39bed;
            --bg-light: #121212;
            --bg-search: #2a2a2a;
            --text-dark: #f3f4f6;
            --text-muted: #9ca3af;
            --border-card: rgba(255, 255, 255, 0.08);
            --shadow-card: rgba(0, 0, 0, 0.4);
            --card-sub-bg: #1e1e1e;
            --badge-text-fallback: #f3f4f6;
            --badge-bg-fallback: rgba(255, 255, 255, 0.1);
            --list-row-icon-bg: rgba(163, 112, 219, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            width: 100%;
            min-height: 100vh;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
        }

        .view-pane {
            display: none;
            width: 100%;
            animation: paneEntry 0.2s ease-out;
        }

        .view-pane.active {
            display: block;
        }

        @keyframes paneEntry {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- APP NAVIGATION STICKY HEADER --- */
        .home-search-header {
            display: flex;
            align-items: center;
            padding: 16px var(--screen-edge-margin);
            gap: 12px;
            background: var(--bg-light);
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid var(--border-card);
        }

        .header-logo-brand-box {
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* --- VIEW AD DETAIL MODIFICATIONS --- */
        .sub-header-navigation-sticky-row {
            padding: 16px var(--screen-edge-margin, 16px);
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-card);
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-arrow-action-btn {
            color: var(--purple-main);
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }

        .detail-presentation-hero-frame {
            position: relative;
            width: 100%;
            height: 240px;
            background-color: var(--bg-search);
        }

        /* --- AD DETAIL SLIDER --- */
        .hero-image-slider-container {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        .hero-image-slider-container::-webkit-scrollbar {
            display: none;
        }

        .slider-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-light);
            color: var(--purple-main);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            z-index: 60;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }

        .slider-nav-btn:active {
            transform: translateY(-50%) scale(0.9);
        }

        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        .detail-pane-slide-image {
            width: 100%;
            height: 100%;
            min-width: 100%;
            object-fit: cover;
            cursor: zoom-in;
        }

        .image-lightbox-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 500;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .image-lightbox-overlay.visible {
            display: flex;
        }

        .image-lightbox-overlay img {
            max-width: 92%;
            max-height: 92%;
            object-fit: contain;
            border-radius: 8px;
            cursor: default;
        }

        .image-slider-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .image-slider-dots .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
        }

        .image-slider-dots .dot.active {
            background: var(--purple-main);
            width: 8px;
            height: 8px;
        }

        .detail-presentation-body-content {
            padding: 16px var(--screen-edge-margin, 16px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .detail-header-flex-block {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #detail-pane-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--purple-main);
            margin: 0 0 4px 0;
        }

        #detail-pane-subtitle {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .save-ad-action-btn {
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--purple-main);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
        }

        .bookmark-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--purple-main);
            stroke-width: 2;
            margin-bottom: 2px;
        }

        .detail-specifications-card-block {
            background: var(--card-sub-bg);
            border-radius: 12px;
            padding: 16px;
        }

        .detail-specifications-card-block h3 {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        #detail-pane-description {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-dark);
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #detail-pane-description.expanded {
            display: block;
            overflow: visible;
        }

        .see-more-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            color: var(--purple-main);
            font-size: 12px;
            font-weight: 700;
            margin-top: 12px;
            cursor: pointer;
        }

        .chevron-down-icon {
            width: 14px;
            height: 14px;
            fill: var(--purple-main);
            transition: transform 0.2s ease;
        }

        .detail-specifications-card-block.specifications-grid-card {
            border: 1px solid var(--border-card);
            border-radius: 16px;
        }

        .meta-technical-attributes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 14px;
            column-gap: 12px;
        }

        .meta-technical-attributes-grid div {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-technical-attributes-grid .grid-full-width {
            grid-column: span 2;
        }

        #meta-attr-extra-fields {
            display: contents;
        }

        .meta-technical-attributes-grid label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .meta-technical-attributes-grid strong {
            font-size: 13px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .attr-icon-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .doc-icon {
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
        }

        .card-action-footer-row {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .footer-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            text-align: center;
            border: 1.5px solid var(--purple-main);
            color: var(--purple-main);
        }

        .similar-ads-section-header {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 12px 0 4px 0;
        }

        .similar-ads-horizontal-scroll-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .similar-ads-horizontal-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .similar-ads-horizontal-scroll-container .ad-card-wrapper {
            min-width: 210px;
            max-width: 210px;
            flex-shrink: 0;
        }

        /* --- BASE LAYOUT TOKENS --- */
        .header-logo-brand-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .search-bar-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-bar-input-wrapper input {
            width: 100%;
            background-color: var(--bg-search);
            border: none;
            border-radius: 24px;
            padding: 12px 16px 12px 46px;
            font-size: 14px;
            outline: none;
            color: var(--text-dark);
        }

        .search-bar-input-wrapper .search-lens-icon-asset {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .search-suggestions-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--card-bg, #fff);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 50;
            overflow: hidden;
            max-height: 280px;
            overflow-y: auto;
        }

        .search-suggestions-dropdown.visible {
            display: block;
        }

        .search-suggestion-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            cursor: pointer;
            font-size: 13.5px;
            color: var(--text-dark);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .search-suggestion-item:last-child { border-bottom: none; }
        .search-suggestion-item:hover { background: var(--bg-search); }

        .search-suggestion-item .suggestion-tag {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-left: auto;
        }

        .search-history-heading {
            padding: 14px 18px 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .search-history-item {
            position: relative;
            overflow: hidden;
        }

        .search-history-item-inner {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 18px;
            background: var(--card-bg, #fff);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
            touch-action: pan-y;
        }

        .search-history-item:last-child .search-history-item-inner { border-bottom: none; }

        .history-term-text {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14.5px;
            color: var(--text-dark);
            cursor: pointer;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-term-text i { color: var(--text-muted); font-size: 16px; flex-shrink: 0; }

        .history-remove-btn {
            background: none;
            border: none;
            color: var(--purple-main);
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: 0.85;
        }

        .history-remove-btn i { font-size: 19px; }

        .search-history-item-delete-bg {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 70px;
            background: #dc2626;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            z-index: 0;
        }

        .hero-banner-carousel {
            margin: 4px var(--screen-edge-margin) 16px var(--screen-edge-margin);
            height: 180px;
            background-color: #500e8c;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(93, 16, 162, 0.15);
        }

        .carousel-scrolling-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.45, 0, 0.55, 1);
        }

        .carousel-slide-card {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 20px 24px;
            position: relative;
            box-sizing: border-box;
            cursor: pointer;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        .carousel-slide-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(41, 5, 74, 0.95) 55%, rgba(41, 5, 74, 0.5) 100%);
            z-index: 1;
        }

        .carousel-slide-card h4 {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            z-index: 2;
            max-width: 85%;
            line-height: 1.4;
        }

        .carousel-slide-card p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.95);
            max-width: 85%;
            line-height: 1.4;
            z-index: 2;
        }

        .section-heading-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px var(--screen-edge-margin) 12px var(--screen-edge-margin);
        }

        .section-heading-row h2 {
            font-size: 15px;
            font-weight: 700;
            color: #500E8C;
        }

        .section-heading-row .arrow-nav-trigger {
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--purple-main);
        }

        .horizontal-scrollable-categories {
            display: flex;
            gap: 14px;
            padding: 4px var(--screen-edge-margin) 12px var(--screen-edge-margin);
            overflow-x: auto;
        }
        .horizontal-scrollable-categories::-webkit-scrollbar { display: none; }

        /* Categories section */
        .category-square-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 84px;
            flex-shrink: 0;
            text-align: center;
            gap: 8px;
        }

        .category-square-card span {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            width: 100%;
            line-height: 1.25;
        }

        .category-square-icon-box {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #6d28d9, #500E8C);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(80, 14, 140, 0.35);
            transition: transform 0.2s ease;
            color: #ffffff;
        }

        .category-square-icon-box i {
            font-size: 28px;
        }

        .category-square-card span {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .category-square-card:active 
        .category-square-icon-box {
            transform: scale(0.95);
        }

        .adaptive-ads-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 var(--screen-edge-margin) 16px var(--screen-edge-margin);
        }

        @media (min-width: 650px) {
            .adaptive-ads-grid-container { grid-template-columns: repeat(3, 1fr); gap: 16px; }
        }
        @media (min-width: 950px) {
            .adaptive-ads-grid-container { grid-template-columns: repeat(4, 1fr); }
        }

        .ad-card-wrapper {
            background-color: var(--card-sub-bg);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 14px var(--shadow-card);
            cursor: pointer;
        }

        .ad-card-media-box {
            width: 100%;
            aspect-ratio: 1.25 / 1;
            overflow: hidden;
        }

        .ad-card-media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-card-information-box {
            padding: 14px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .ad-card-main-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--purple-text-title);
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .ad-card-subtitle-text {
            font-size: 13px;
            color: var(--text-dark);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .badge-date-container-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .type-document-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            color: var(--badge-text-fallback);
            background-color: var(--badge-bg-fallback);
            padding: 5px 10px;
            border-radius: 6px;
            height: 26px;
        }

        .posted-calendar-date-label {
            font-size: 11.5px;
            color: var(--text-muted);
        }

        .verification-status-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 12px;
        }

        .verification-badge-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--purple-main);
        }

        .verification-badge-group img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            vertical-align: middle;
        }

        .extra-modifier-tag-text {
            font-size: 11.5px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .ad-card-footer-location-metrics {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            padding-top: 10px;
            border-top: 1px solid var(--border-card);
            font-size: 11.5px;
            color: var(--text-muted);
            gap: 4px;
        }

        @media(min-width: 360px) {
            .ad-card-footer-location-metrics { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .sub-header-navigation-sticky-row h1 { font-size: 15px; font-weight: 700; color: #500E8C; }
        #explore-categories-header-title { color: #500E8C; }

        .vertical-categories-stack-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            padding: 16px var(--screen-edge-margin);
        }

        .category-list-row-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
            padding: 20px 10px;
            background: var(--card-bg, rgba(255,255,255,0.03));
            border: 1px solid var(--border-card);
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .category-list-row-item:active {
            transform: scale(0.96);
        }

        .category-list-row-item .icon-wrapper-box {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #6d28d9, #500E8C);
            border-radius: 14px;
            margin-right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(80, 14, 140, 0.35);
        }

        .category-list-row-item .icon-wrapper-box i {
            font-size: 24px;
        }

        .category-list-row-item span {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .runtime-filters-capsule-row { display: flex; gap: 8px; padding: 12px var(--screen-edge-margin); overflow-x: auto; }
        .runtime-filters-capsule-row::-webkit-scrollbar { display: none; }

        .filter-capsule-toggle-trigger {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid transparent;
            background: rgba(80, 14, 140, 0.1);
            color: var(--purple-main);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .dark-theme .filter-capsule-toggle-trigger { background: rgba(163, 98, 230, 0.16); }

        .filter-capsule-toggle-trigger.active-pill {
            background: var(--purple-main);
            color: #ffffff;
        }

        .filter-sort-heading {
            padding: 10px var(--screen-edge-margin) 0;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--text-muted);

        .filter-counter-metrics-bar { 
            padding: 4px var(--screen-edge-margin) 12px var(--screen-edge-margin); 
            font-size: 11.5px; 
            color: var(--text-muted); 
            text-align: right;
        }
        
        /* ==========================================
           BOTTOM PINNED GLOBAL TAB MENU LAYOUT
        ========================================== */
        .bottom-nav {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 80px;
            background: var(--card-sub-bg); 
            border-top: 1px solid var(--border-card); 
            display: flex;
            align-items: center; 
            justify-content: space-around;

            align-items: center;

            text-decoration: none;

            padding: 8px 0;

        .bottom-nav .nav-item i {
            font-size: 26px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }
        .bottom-nav .nav-item.active i {
            font-size: 32px;
            color: var(--purple-main);
        }

        .bottom-nav .nav-item span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .bottom-nav .nav-item.active span {
            color: var(--purple-main);
        }

        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .bottom-nav { padding: 0; height: 72px; }
            .nav-item { font-size: 11px; width: auto; }

    </style>

    <script>
        // Real ad data now comes from OpenAPI (api.js) instead of hardcoded samples.
        // ALL_ADS is populated on page load — see loadHomeFeed() below.
        let ALL_ADS = [];

        // Ads posted by people advertising themselves (job seekers, freelancers, interns)
        const CANDIDATE_TYPES = ['Jobseeker', 'Freelancer', 'Intern'];
        // Ads posted by businesses looking to hire
        const HIRING_TYPES = ['Business'];

        // Categories now come from the same shared list used in add.html,
        // so browsing and posting always match up exactly.
        const CATEGORIES_DATABASE = Object.keys(OpenAPI.CATEGORIES).map(name => ({
            name: name,
            label: name,
            icon: OpenAPI.getCategoryIcon(name),
            iconClass: OpenAPI.getCategoryIconClass(name)
        }));

        let currentAdSlideIndex = 0;
        let historyStack = ['view-home'];
        let currentFilterType = "All"; 
        let currentFilterCategory = "All";
        let currentPillMode = "All";
        let carouselIndex = 0;
        let carouselInterval;
        let currentAdOwner = null;
        let currentActiveItemData = null;
        let currentDetailSlides = [];

        // Active Track Profile Configurations
        let userRole = localStorage.getItem('open_user_role') || 'Jobseeker'; 

        window.addEventListener('DOMContentLoaded', async () => {
            await loadHomeFeed();
            applyAdaptiveUserRoleUI();
            renderCategoriesShortcutTrack();
            renderFullCategoriesListPanel();
            renderDashboardFeeds();
            initializeCarouselTrack();
            initializeAdDetailInteractions();
            initializeImageLightbox();
            setActiveNav();

            const urlParams = new URLSearchParams(window.location.search);
            const categoryFromUrl = urlParams.get('category');
            const openAdIdFromUrl = urlParams.get('openAdId');
    
            if (categoryFromUrl) {
                openFilteredListWithContext('All', categoryFromUrl);
                window.history.replaceState({}, document.title, "home.html");
            }
            if (openAdIdFromUrl) {
                openAdDetailPresentation(openAdIdFromUrl);
                window.history.replaceState({}, document.title, "home.html");
            }

            const carouselContainer = document.querySelector('.hero-banner-carousel');
            if (carouselContainer) {
                carouselContainer.addEventListener('mouseenter', () => clearInterval(carouselInterval));
                carouselContainer.addEventListener('mouseleave', () => {
                    startCarouselAutoPlay(getTrendingAds().length);
                });
            }

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-bar-input-wrapper')) {
                    hideSearchSuggestions();
                }
            });
        });

        // Pulls every ad that exists in this browser (see the note in api.js about
        // this being a stand-in for a real server) and preloads a thumbnail image
        // for each one so cards don't pop in empty.
        async function loadHomeFeed() {
            ALL_ADS = await OpenAPI.getAllAds();
            const thumbnails = await Promise.all(ALL_ADS.map(async (ad) => {
                const media = await OpenAPI.getAdMedia(ad.adId);
                return (media.images && media.images[0]) || null;
            }));
            ALL_ADS.forEach((ad, i) => { ad._thumb = thumbnails[i]; });
        }

        // "Trending" = the most-viewed real ads, based on actual clicks people make
        // to open an ad's detail page (see OpenAPI.recordAdView).
        function getTrendingAds() {
            return [...ALL_ADS]
                .sort((a, b) => OpenAPI.getAdViews(b.adId) - OpenAPI.getAdViews(a.adId))
                .slice(0, 8);
        }


        function applyAdaptiveUserRoleUI() {
            const searchInput = document.getElementById('runtime-global-search');
            const feedTitle = document.getElementById('dynamic-feed-title');
            
            const titleTrackOne = document.getElementById('title-track-one');
            const titleTrackTwo = document.getElementById('title-track-two');
            const titleTrackAll = document.getElementById('title-track-all');
            
            const arrowTrackOne = document.getElementById('arrow-track-one');
            const arrowTrackTwo = document.getElementById('arrow-track-two');

            if (userRole === 'Business Owner') {
                if(searchInput) searchInput.placeholder = "Search for people to hire...";
                if(feedTitle) feedTitle.innerText = "Top People For You";
                
                if(titleTrackOne) titleTrackOne.innerText = "People Looking For Work";
                if(arrowTrackOne) arrowTrackOne.setAttribute('onclick', "openFilteredListWithContext('Candidate', 'People Looking For Work')");
                
                if(titleTrackTwo) titleTrackTwo.innerText = "Interns Available Now";
                if(arrowTrackTwo) arrowTrackTwo.setAttribute('onclick', "openFilteredListWithContext('Intern', 'Interns Available Now')");
                
                if(titleTrackAll) titleTrackAll.innerText = "See everyone available to hire";
            } 
            else if (userRole === 'Freelancer') {
                if(searchInput) searchInput.placeholder = "Search for jobs and projects...";
                if(feedTitle) feedTitle.innerText = "Work For You";
                
                if(titleTrackOne) titleTrackOne.innerText = "Popular Jobs";
                if(arrowTrackOne) arrowTrackOne.setAttribute('onclick', "openFilteredListWithContext('Hiring', 'Popular Jobs')");
                
                if(titleTrackTwo) titleTrackTwo.innerText = "Other Freelancers";
                if(arrowTrackTwo) arrowTrackTwo.setAttribute('onclick', "openFilteredListWithContext('Candidate', 'Other Freelancers')");
                
                if(titleTrackAll) titleTrackAll.innerText = "See all available work";
            } 
            else if (userRole === 'Internship Seeker') {
                if(searchInput) searchInput.placeholder = "Search for internships...";
                if(feedTitle) feedTitle.innerText = "Internships For You";
                
                if(titleTrackOne) titleTrackOne.innerText = "Popular Internships";
                if(arrowTrackOne) arrowTrackOne.setAttribute('onclick', "openFilteredListWithContext('Hiring', 'Popular Internships')");
                
                if(titleTrackTwo) titleTrackTwo.innerText = "Other Students Available";
                if(arrowTrackTwo) arrowTrackTwo.setAttribute('onclick', "openFilteredListWithContext('Intern', 'Other Students Available')");
                
                if(titleTrackAll) titleTrackAll.innerText = "See all internship options";
            } 
            else { // Jobseeker (Default)
                if(searchInput) searchInput.placeholder = "Search jobs, ads, positions...";
                if(feedTitle) feedTitle.innerText = "Jobs For You";
                
                if(titleTrackOne) titleTrackOne.innerText = "Popular Jobs";
                if(arrowTrackOne) arrowTrackOne.setAttribute('onclick', "openFilteredListWithContext('Hiring', 'Popular Jobs')");
                
                if(titleTrackTwo) titleTrackTwo.innerText = "Popular People For Hire";
                if(arrowTrackTwo) arrowTrackTwo.setAttribute('onclick', "openFilteredListWithContext('Candidate', 'Popular People For Hire')");
                
                if(titleTrackAll) titleTrackAll.innerText = "See all ads";
            }
        }

        function navigateToPane(targetPaneId) {
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
            const destination = document.getElementById(targetPaneId);
            if(destination) {
                destination.classList.add('active');
                if(historyStack[historyStack.length - 1] !== targetPaneId) {
                    historyStack.push(targetPaneId);
                }
            }
            if (targetPaneId === 'view-home') resetHomeSearchBox();
            window.scrollTo(0,0);
        }

        function handlePaneBackNavigation() {
            if(historyStack.length > 1) {
                historyStack.pop();
                const previousPane = historyStack[historyStack.length - 1];
                document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
                document.getElementById(previousPane).classList.add('active');
                if (previousPane === 'view-home') resetHomeSearchBox();
            }
        }

        // The search box is for actively searching right now, not a
        // record of the last thing you looked up — leaving Search Results
        // and coming back to Home should always show an empty box, with
        // that term now sitting in Recent Searches instead.
        function resetHomeSearchBox() {
            const input = document.getElementById('runtime-global-search');
            if (input) input.value = '';
            hideSearchSuggestions();
        }

        function setActiveNav() {
            const currentPage = window.location.pathname.split('/').pop() || 'home.html';
            const navItems = document.querySelectorAll('.nav-item[data-route]');
            navItems.forEach(item => item.classList.remove('active'));

            const routeMap = {
                'add.html': 'add',
                'saved.html': 'saved',
                'home.html': 'home',
                'message.html': 'messages',
                'settings.html': 'settings'
            };

            const currentRoute = routeMap[currentPage];
            if(currentRoute) {
                const activeItem = document.querySelector(`.nav-item[data-route="${currentRoute}"]`);
                if(activeItem) activeItem.classList.add('active');
            }
        }

        function initializeCarouselTrack() {
            const track = document.getElementById('verified-trending-carousel-track');
            const trendingItems = getTrendingAds();
            if (!track) return;
            track.innerHTML = '';

            if (trendingItems.length === 0) {
                track.innerHTML = `<div class="carousel-slide-card" style="background-color:#500e8c;"><h4>No trending ads yet</h4><p>Be the first to post one!</p></div>`;
                return;
            }
    
            trendingItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'carousel-slide-card';
                card.style.backgroundImage = `url('${item._thumb || 'https://via.placeholder.com/400x300?text=No+Photo'}')`;
                card.onclick = () => openAdDetailPresentation(item.adId);
                card.innerHTML = `
                    <h4>${item.title}</h4>
                    <p>${item.subcategory || item.category || ''}</p>
                `;
                track.appendChild(card);
            });

            startCarouselAutoPlay(trendingItems.length);
        }

        function startCarouselAutoPlay(totalSlides) {
            clearInterval(carouselInterval);
            if (totalSlides <= 1) return;

            carouselInterval = setInterval(() => {
                const track = document.getElementById('verified-trending-carousel-track');
                if (!track) return;
                carouselIndex++;
                if (carouselIndex >= totalSlides) {
                    carouselIndex = 0;
                }
                track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            }, 5000);
        }

        function buildAdHTMLComponent(item) {
            const badge = OpenAPI.getAdTypeBadge(item.type);
            const subtitleText = item.subcategory || item.category || "";
            const dateText = item.timestamp ? new Date(item.timestamp).toLocaleDateString() : "";
            const viewsCount = OpenAPI.getAdViews(item.adId);
            const thumb = item._thumb || 'https://via.placeholder.com/400x300?text=No+Photo';

            return `
                <div class="ad-card-wrapper" onclick="openAdDetailPresentation('${item.adId}')">
                    <div class="ad-card-media-box">
                        <img src="${thumb}" alt="Ad photo">
                    </div>
                    <div class="ad-card-information-box">
                        <h3 class="ad-card-main-title">${item.title}</h3>
                        <p class="ad-card-subtitle-text">${subtitleText}</p>
                        
                        <div class="badge-date-container-row">
                            <span class="type-document-tag" style="background:${badge.color}22; color:${badge.color};">${badge.label}</span>
                            <span class="posted-calendar-date-label">${dateText}</span>
                        </div>

                        <div class="verification-status-meta-row">
                            <div></div>
                            ${item.subTypeModel ? `<span class="extra-modifier-tag-text">${item.subTypeModel}</span>` : ''}
                        </div>

                        <div class="ad-card-footer-location-metrics">
                            <span class="loc-label">${item.area}, ${item.region}</span>
                            <span class="view-count-label">${viewsCount} views</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderDashboardFeeds() {
            const hiringAds = ALL_ADS.filter(i => HIRING_TYPES.includes(i.type));
            const candidateAds = ALL_ADS.filter(i => CANDIDATE_TYPES.includes(i.type));
            const internAds = ALL_ADS.filter(i => i.type === 'Intern');
            const trending = getTrendingAds();

            let forYouData, trackOneData, trackTwoData;

            if (userRole === 'Business Owner') {
                forYouData = candidateAds;
                trackOneData = candidateAds;
                trackTwoData = internAds;
            } else if (userRole === 'Freelancer') {
                forYouData = hiringAds;
                trackOneData = trending.filter(i => HIRING_TYPES.includes(i.type));
                trackTwoData = candidateAds.filter(i => i.type === 'Freelancer');
            } else if (userRole === 'Internship Seeker') {
                forYouData = hiringAds;
                trackOneData = trending.filter(i => HIRING_TYPES.includes(i.type));
                trackTwoData = internAds;
            } else { // Jobseeker
                forYouData = hiringAds;
                trackOneData = trending.filter(i => HIRING_TYPES.includes(i.type));
                trackTwoData = candidateAds;
            }

            // NOTE: no cross-bucket fallback here on purpose — if there aren't
            // any real hiring ads yet, the "Jobs For You" section should show
            // an empty state (handled in the render lines below), not quietly
            // fill up with Freelancer/Intern ads mislabeled as jobs.

            document.getElementById('feed-for-you').innerHTML = forYouData.slice(0, 4).map(buildAdHTMLComponent).join('') || '<p style="font-size:13px;color:var(--text-muted);padding:10px 0;">No ads yet — be the first to post one!</p>';
            document.getElementById('feed-trending-jobs').innerHTML = trackOneData.slice(0, 4).map(buildAdHTMLComponent).join('') || '<p style="font-size:13px;color:var(--text-muted);padding:10px 0;">Nothing here yet.</p>';
            document.getElementById('feed-trending-cvs').innerHTML = trackTwoData.slice(0, 4).map(buildAdHTMLComponent).join('') || '<p style="font-size:13px;color:var(--text-muted);padding:10px 0;">Nothing here yet.</p>';
            document.getElementById('feed-discover-all').innerHTML = ALL_ADS.map(buildAdHTMLComponent).join('') || '<p style="font-size:13px;color:var(--text-muted);padding:10px 0;">No ads have been posted yet.</p>';
        }

        function renderCategoriesShortcutTrack() {
            const container = document.getElementById('home-categories-shortcut-track');
            if (!container) return;
            container.innerHTML = CATEGORIES_DATABASE.slice(0, 6).map(cat => `
            <div class="category-square-card" onclick="openFilteredListWithContext('All', '${cat.name}')">
                <div class="category-square-icon-box">
                    <i class="ph ph-${cat.iconClass}"></i>
                </div>
                <span>${cat.label}</span>
            </div>
            `).join('');
        }

        function renderFullCategoriesListPanel() {
            const container = document.getElementById('full-categories-list-render');
            if (!container) return;
            container.innerHTML = CATEGORIES_DATABASE.map(cat => `
                <div class="category-list-row-item" onclick="openFilteredListWithContext('All', '${cat.name}')">
                    <div class="icon-wrapper-box">
                        <i class="ph ph-${cat.iconClass}"></i>
                    </div>
                    <span>${cat.name}</span>
                </div>
            `).join('');
        }

        function openFilteredListWithContext(type, titleOrCategoryName) {
            currentFilterType = type;
            currentPillMode = "All";
            
            const matchesCategory = CATEGORIES_DATABASE.some(c => c.name === titleOrCategoryName);
            if (matchesCategory) {
                currentFilterCategory = titleOrCategoryName;
                document.getElementById('filtered-view-title-label').innerText = titleOrCategoryName;
            } else {
                currentFilterCategory = "All";
                document.getElementById('filtered-view-title-label').innerText = titleOrCategoryName;
            }

            document.querySelectorAll('#pillModeRow .filter-capsule-toggle-trigger').forEach(btn => {
                btn.classList.toggle('active-pill', btn.dataset.mode === 'All');
            });
            
            executeRuntimeFilterEngine();
            navigateToPane('view-filtered-list');
        }

        function executeRuntimeFilterEngine() {
            let records = ALL_ADS;
            
            // Context this results page was opened with (e.g. from a
            // trending carousel or a category card on Home).
            if (currentFilterType === "Hiring") {
                records = records.filter(r => HIRING_TYPES.includes(r.type));
            } else if (currentFilterType === "Candidate") {
                records = records.filter(r => CANDIDATE_TYPES.includes(r.type));
            } else if (currentFilterType === "Intern") {
                records = records.filter(r => r.type === 'Intern');
            }
            if (currentFilterCategory !== "All") {
                records = records.filter(r => r.category === currentFilterCategory);
            }

            const searchInput = document.getElementById('runtime-global-search').value.trim().toLowerCase();
            if (searchInput) {
                records = records.filter(r => 
                    r.title.toLowerCase().includes(searchInput) || 
                    (r.description || "").toLowerCase().includes(searchInput) ||
                    (r.subcategory || "").toLowerCase().includes(searchInput)
                );
            }

            // The pill row the person can see and click, on top of
            // whatever context they arrived with.
            if (['Freelancer', 'Jobseeker', 'Business', 'Intern'].includes(currentPillMode)) {
                records = records.filter(r => r.type === currentPillMode);
            }
            records = applyPillSort([...records]);

            document.getElementById('filter-results-counter').innerText = `${records.length} Match${records.length === 1 ? '' : 'es'} Found`;

            const emptyMessage = searchInput
                ? `No results found for "${document.getElementById('runtime-global-search').value.trim()}"`
                : 'No ads match this search yet.';

            document.getElementById('feed-filtered-list-output').innerHTML = records.map(buildAdHTMLComponent).join('') || `<p style="font-size:13px;color:var(--text-muted);padding:10px 0;">${emptyMessage}</p>`;
        }

        function applyPillSort(records) {
            switch (currentPillMode) {
                case 'Newest':
                    return records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                case 'Oldest':
                    return records.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                case 'Popular':
                    return records.sort((a, b) => OpenAPI.getAdViews(b.adId) - OpenAPI.getAdViews(a.adId));
                case 'Location':
                    return records.sort((a, b) => (a.region || '').localeCompare(b.region || ''));
                case 'Categories':
                    return records.sort((a, b) => (a.category || '').localeCompare(b.category || ''));
                default:
                    // 'All', or one of the type pills (Freelancer/Jobseeker/
                    // Business/Intern) which already filtered above — no
                    // extra reordering needed on top of that.
                    return records;
            }
        }

        function selectPillMode(mode) {
            currentPillMode = mode;
            document.querySelectorAll('#pillModeRow .filter-capsule-toggle-trigger').forEach(btn => {
                btn.classList.toggle('active-pill', btn.dataset.mode === mode);
            });
            executeRuntimeFilterEngine();
        }

        function handleSearchSubmit(event) {
            if (event.key === 'Enter') {
                hideSearchSuggestions();
                triggerManualSearchSubmit();
            }
        }

        function triggerManualSearchSubmit() {
            hideSearchSuggestions();
            const term = document.getElementById('runtime-global-search').value.trim();
            const session = OpenAPI.getSession();
            if (term && session) {
                OpenAPI.addSearchHistoryEntry(session.email, term);
            }
            openFilteredListWithContext('All', 'Search Results');
        }

        // Suggests matching ad titles and categories as the person types,
        // so they don't have to know the exact wording of what they want.
        function handleSearchSuggestInput() {
            const input = document.getElementById('runtime-global-search');
            const dropdown = document.getElementById('search-suggestions-dropdown');
            const query = input.value.trim().toLowerCase();

            if (query.length === 0) {
                renderSearchHistoryDropdown();
                return;
            }

            if (query.length < 2) {
                dropdown.classList.remove('visible');
                return;
            }

            const titleMatches = ALL_ADS
                .filter(ad => ad.title.toLowerCase().includes(query))
                .slice(0, 4)
                .map(ad => ({ text: ad.title, tag: OpenAPI.getAdTypeBadge(ad.type).label }));

            const categoryMatches = Object.keys(OpenAPI.CATEGORIES)
                .filter(cat => cat.toLowerCase().includes(query))
                .slice(0, 3)
                .map(cat => ({ text: cat, tag: 'Category' }));

            const suggestions = [...categoryMatches, ...titleMatches].slice(0, 6);

            if (suggestions.length === 0) {
                dropdown.classList.remove('visible');
                return;
            }

            dropdown.innerHTML = suggestions.map(s => `
                <div class="search-suggestion-item" onclick="selectSearchSuggestion('${s.text.replace(/'/g, "\\'")}', '${s.tag}')">
                    <span>${s.text}</span>
                    <span class="suggestion-tag">${s.tag}</span>
                </div>
            `).join('');
            dropdown.classList.add('visible');
        }

        // Shows recent searches the moment the box is focused, as long as
        // it's empty — typing immediately replaces this with suggestions.
        function handleSearchBoxFocus() {
            const input = document.getElementById('runtime-global-search');
            if (input.value.trim().length === 0) {
                renderSearchHistoryDropdown();
            }
        }

        function renderSearchHistoryDropdown() {
            const dropdown = document.getElementById('search-suggestions-dropdown');
            const session = OpenAPI.getSession();
            const history = session ? OpenAPI.getSearchHistory(session.email) : [];

            if (history.length === 0) {
                dropdown.classList.remove('visible');
                return;
            }

            dropdown.innerHTML = `<div class="search-history-heading">Recent Searches</div>` +
                history.map(term => {
                    const safeAttr = term.replace(/'/g, "\\'");
                    return `
                        <div class="search-history-item" data-term="${term.replace(/"/g, '&quot;')}">
                            <div class="search-history-item-delete-bg"><i class="ph ph-trash"></i></div>
                            <div class="search-history-item-inner">
                                <span class="history-term-text" onclick="selectSearchHistoryTerm('${safeAttr}')">
                                    <i class="ph ph-clock-counter-clockwise"></i>${term}
                                </span>
                                <button class="history-remove-btn" onclick="removeSearchHistoryTerm(event, '${safeAttr}')">
                                    <i class="ph ph-x"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

            dropdown.classList.add('visible');
            attachSwipeToDeleteHandlers();
        }

        function selectSearchHistoryTerm(term) {
            document.getElementById('runtime-global-search').value = term;
            hideSearchSuggestions();
            triggerManualSearchSubmit();
        }

        function removeSearchHistoryTerm(event, term) {
            event.stopPropagation();
            const session = OpenAPI.getSession();
            if (!session) return;
            OpenAPI.removeSearchHistoryEntry(session.email, term);
            renderSearchHistoryDropdown();
        }

        // Lets each history row be swiped left on touch devices to delete
        // it, matching the "x" button's behavior.
        function attachSwipeToDeleteHandlers() {
            document.querySelectorAll('.search-history-item').forEach(item => {
                const inner = item.querySelector('.search-history-item-inner');
                let startX = 0;
                let currentX = 0;
                let dragging = false;

                inner.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    dragging = true;
                    inner.style.transition = 'none';
                }, { passive: true });

                inner.addEventListener('touchmove', (e) => {
                    if (!dragging) return;
                    currentX = e.touches[0].clientX - startX;
                    if (currentX < 0) {
                        inner.style.transform = `translateX(${Math.max(currentX, -90)}px)`;
                    }
                }, { passive: true });

                inner.addEventListener('touchend', () => {
                    dragging = false;
                    inner.style.transition = 'transform 0.2s ease';
                    if (currentX < -55) {
                        inner.style.transform = 'translateX(-100%)';
                        const term = item.dataset.term;
                        setTimeout(() => {
                            const session = OpenAPI.getSession();
                            if (session) OpenAPI.removeSearchHistoryEntry(session.email, term);
                            renderSearchHistoryDropdown();
                        }, 180);
                    } else {
                        inner.style.transform = 'translateX(0)';
                    }
                    currentX = 0;
                });
            });
        }

        function selectSearchSuggestion(text, tag) {
            document.getElementById('runtime-global-search').value = text;
            hideSearchSuggestions();
            if (tag === 'Category') {
                openFilteredListWithContext('All', text);
            } else {
                triggerManualSearchSubmit();
            }
        }

        function hideSearchSuggestions() {
            const dropdown = document.getElementById('search-suggestions-dropdown');
            if (dropdown) dropdown.classList.remove('visible');
        }

        async function openAdDetailPresentation(adId) {
            const target = ALL_ADS.find(i => i.adId === adId);
            if (!target) return;

            const media = await OpenAPI.getAdMedia(adId);
            currentDetailSlides = (media.images && media.images.length > 0) ? media.images : ['https://via.placeholder.com/400x300?text=No+Photo'];

            currentAdOwner = { name: target.title, avatar: currentDetailSlides[0] };
            currentActiveItemData = target;

            // Counts as a real view — this is what "trending" is based on
            OpenAPI.recordAdView(adId);

            currentAdSlideIndex = 0;
            const slider = document.getElementById('imageSlider');
            if (slider) {
                slider.innerHTML = currentDetailSlides.map((src, i) =>
                    `<img class="detail-pane-slide-image" src="${src}" alt="Ad photo ${i + 1}" onclick="openImageLightbox('${src}')">`
                ).join('');
                slider.scrollLeft = 0;
            }
            const dotsContainer = document.getElementById('sliderDots');
            if (dotsContainer) {
                dotsContainer.innerHTML = currentDetailSlides.map((_, i) =>
                    `<span class="dot ${i === 0 ? 'active' : ''}"></span>`
                ).join('');
            }

            document.getElementById('detail-pane-title').innerText = target.title;
            document.getElementById('detail-pane-subtitle').innerText = target.subcategory || target.category || "";
            document.getElementById('detail-pane-description').innerText = target.description || "";

            document.getElementById('meta-attr-type').innerText = OpenAPI.getAdTypeBadge(target.type).label;
            document.getElementById('meta-attr-verified').innerText = target.contact || "Not provided";
            document.getElementById('meta-attr-category').innerText = target.category || "—";
            document.getElementById('meta-attr-experience').innerText = target.financialScale ? `₵${target.financialScale}` : "Not specified";
            document.getElementById('meta-attr-sub-category').innerText = target.subcategory || "—";
            document.getElementById('meta-attr-date').innerText = target.timestamp ? new Date(target.timestamp).toLocaleDateString() : "";
            document.getElementById('meta-attr-location').innerText = `${target.area || 'All Areas'}, ${target.region || 'All Regions'}`;

            // Same type-specific details shown on the poster's own ads.html dashboard
            const extraFields = OpenAPI.buildTypeSpecificFields(target);
            document.getElementById('meta-attr-extra-fields').innerHTML = extraFields.map(f => `
                <div>
                    <label>${f.label}:</label>
                    <strong>${f.val}</strong>
                </div>
            `).join('');

            // Contextual Copy adaptation inside Details Pane Footer Action button
            const actionMessageBtn = document.getElementById('ad-detail-message-action-trigger');
            const saveTextBtn = document.getElementById('save-ad-text');
            const headingSimilar = document.getElementById('detail-similar-heading');

            if (userRole === 'Business Owner') {
                if(headingSimilar) headingSimilar.innerText = "See similar people";
            } else {
                if(headingSimilar) headingSimilar.innerText = "See similar ads";
            }

            // You can't message yourself about your own ad
            const currentSession = OpenAPI.getSession();
            const isOwnAd = currentSession && currentSession.email === target.postedBy;
            if (actionMessageBtn) {
                if (isOwnAd) {
                    actionMessageBtn.innerText = "This is your ad";
                    actionMessageBtn.disabled = true;
                    actionMessageBtn.style.opacity = "0.5";
                    actionMessageBtn.style.cursor = "not-allowed";
                } else {
                    actionMessageBtn.innerText = "Message";
                    actionMessageBtn.disabled = false;
                    actionMessageBtn.style.opacity = "1";
                    actionMessageBtn.style.cursor = "pointer";
                }
            }

            updateSaveButtonUI(adId);
            renderSimilarAds(target);
            navigateToPane('view-ad-detail');
        }

        function moveAdSlide(direction) {
            const slider = document.getElementById('imageSlider');
            const slides = document.querySelectorAll('#imageSlider .detail-pane-slide-image');
            if (!slider || slides.length === 0) return;

            currentAdSlideIndex += direction;
            if (currentAdSlideIndex >= slides.length) currentAdSlideIndex = 0;
            if (currentAdSlideIndex < 0) currentAdSlideIndex = slides.length - 1;

            slider.scrollLeft = slider.offsetWidth * currentAdSlideIndex;
            updateSliderDots();
        }

        function updateSliderDots() {
            const dots = document.querySelectorAll('#sliderDots .dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentAdSlideIndex));
        }

        // Click a photo to see it alone, full-screen. Click anywhere outside it to close.
        function initializeImageLightbox() {
            // Handled by openImageLightbox()/closeImageLightbox() below; this hook
            // exists so DOMContentLoaded has one clear place calling setup steps.
        }

        function openImageLightbox(src) {
            const overlay = document.getElementById('image-lightbox-overlay');
            const img = document.getElementById('image-lightbox-img');
            img.src = src;
            overlay.classList.add('visible');
        }

        function closeImageLightbox(event) {
            // Only close when clicking the dark backdrop itself, not the image
            if (event.target.id === 'image-lightbox-overlay') {
                document.getElementById('image-lightbox-overlay').classList.remove('visible');
            }
        }

        function initializeAdDetailInteractions() {
            const seeMore = document.getElementById('description-see-more');
            const desc = document.getElementById('detail-pane-description');
            if (seeMore && desc) {
                seeMore.onclick = () => {
                    const isExpanded = desc.classList.toggle('expanded');
                    seeMore.querySelector('span').innerText = isExpanded ? "See less" : "See more";
                    seeMore.querySelector('svg').style.transform = isExpanded ? "rotate(180deg)" : "rotate(0deg)";
                };
            }

            const saveBtn = document.getElementById('btn-save-ad-toggle');
            if (saveBtn) {
                saveBtn.onclick = () => {
                    if (!currentActiveItemData) return;
                    const nowSaved = OpenAPI.toggleSavedAd(currentActiveItemData.adId);
                    updateSaveButtonUI(currentActiveItemData.adId);
                };
            }
        }

        function updateSaveButtonUI(adId) {
            const isSaved = OpenAPI.isAdSaved(adId);
            const textNode = document.getElementById('save-ad-text');
            const iconNode = document.querySelector('.bookmark-icon');
            
            if (textNode) {
                textNode.innerText = isSaved ? "Saved" : "Save ad";
            }
            if (iconNode) iconNode.style.fill = isSaved ? "var(--purple-main)" : "none";
        }

        function renderSimilarAds(activeItem) {
            const track = document.getElementById('detail-similar-ads-track');
            if (!track) return;

            const similar = ALL_ADS.filter(i => i.category === activeItem.category && i.adId !== activeItem.adId);
            if (similar.length === 0) {
                track.innerHTML = `<p style="font-size:12px; color:var(--text-muted); padding:10px 0;">No similar ads found yet.</p>`;
                return;
            }
            track.innerHTML = similar.slice(0, 6).map(buildAdHTMLComponent).join('');
        }

        async function routeAdPresenterToChatThread() {
            if (!currentActiveItemData) {
                await OpenAPI.showAlert("Error: No listing owner found", { title: "Can't message" });
                return;
            }
            const session = OpenAPI.getSession();
            if (!session || !session.email) {
                await OpenAPI.showAlert("Please log in first to send a message.", { title: "Sign in required" });
                return;
            }
            if (currentActiveItemData.postedBy === session.email) {
                // Shouldn't normally be reachable since the button is disabled
                // for your own ads, but guarded here too just in case.
                return;
            }
            const url = `message.html?with=${encodeURIComponent(currentActiveItemData.postedBy)}&adId=${encodeURIComponent(currentActiveItemData.adId)}`;
            window.location.href = url;
        }
    </script>

    OpenAPI.refreshMessagesNavBadge();
});
