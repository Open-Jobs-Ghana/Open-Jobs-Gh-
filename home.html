<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Jobs Ghana</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Instant Dark Mode Switch Check to Prevent Flashing -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
    
    <style>
        /* --- CORE CONFIGURATION & MATERIAL SYSTEM --- */
        :root {
            --purple-main: #500e8c;
            --purple-text-title: #500e8c;
            --bg-light: #ffffff;
            --bg-search: #f1f2f6;
            --text-dark: #1a1a1a;
            --text-muted: #8e8e93;
            --border-card: #f2f2f7;
            --shadow-card: rgba(0, 0, 0, 0.06);
            --screen-edge-margin: 16px;
            --card-sub-bg: #ffffff;
            --badge-text-fallback: #1c1c1e;
            --badge-bg-fallback: #e5e5ea;
            --list-row-icon-bg: #f4ebfc;
        }

        .dark-theme {
            --purple-main: #a370db;
            --purple-text-title: #c39bed;
            --bg-light: #121212;
            --bg-search: #2a2a2a;
            --text-dark: #f3f4f6;
            --text-muted: #9ca3af;
            --border-card: rgba(255, 255, 255, 0.08);
            --shadow-card: rgba(0, 0, 0, 0.4);
            --card-sub-bg: #1e1e1e;
            --badge-text-fallback: #f3f4f6;
            --badge-bg-fallback: rgba(255, 255, 255, 0.1);
            --list-row-icon-bg: rgba(163, 112, 219, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            width: 100%;
            min-height: 100vh;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
        }

        .view-pane {
            display: none;
            width: 100%;
            animation: paneEntry 0.2s ease-out;
        }

        .view-pane.active {
            display: block;
        }

        @keyframes paneEntry {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- APP NAVIGATION STICKY HEADER --- */
        .home-search-header {
            display: flex;
            align-items: center;
            padding: 16px var(--screen-edge-margin);
            gap: 12px;
            background: var(--bg-light);
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid var(--border-card);
        }

        .header-logo-brand-box {
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* --- VIEW AD DETAIL MODIFICATIONS --- */
        .sub-header-navigation-sticky-row {
            padding: 16px var(--screen-edge-margin, 16px);
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-card);
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-arrow-action-btn {
            color: var(--purple-main);
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }

        .detail-presentation-hero-frame {
            position: relative;
            width: 100%;
            height: 240px;
            background-color: var(--bg-search);
        }

        /* --- AD DETAIL SLIDER --- */
        .hero-image-slider-container {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        .hero-image-slider-container::-webkit-scrollbar {
            display: none;
        }

        .slider-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-light);
            color: var(--purple-main);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            z-index: 60;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }

        .slider-nav-btn:active {
            transform: translateY(-50%) scale(0.9);
        }

        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        .detail-pane-slide-image {
            width: 100%;
            height: 100%;
            min-width: 100%;
            object-fit: cover;
        }

        .image-slider-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .image-slider-dots .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
        }

        .image-slider-dots .dot.active {
            background: var(--purple-main);
            width: 8px;
            height: 8px;
        }

        .detail-presentation-body-content {
            padding: 16px var(--screen-edge-margin, 16px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .detail-header-flex-block {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #detail-pane-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--purple-main);
            margin: 0 0 4px 0;
        }

        #detail-pane-subtitle {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .save-ad-action-btn {
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--purple-main);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
        }

        .bookmark-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--purple-main);
            stroke-width: 2;
            margin-bottom: 2px;
        }

        .detail-specifications-card-block {
            background: var(--card-sub-bg);
            border-radius: 12px;
            padding: 16px;
        }

        .detail-specifications-card-block h3 {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        #detail-pane-description {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-dark);
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #detail-pane-description.expanded {
            display: block;
            overflow: visible;
        }

        .see-more-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            color: var(--purple-main);
            font-size: 12px;
            font-weight: 700;
            margin-top: 12px;
            cursor: pointer;
        }

        .chevron-down-icon {
            width: 14px;
            height: 14px;
            fill: var(--purple-main);
            transition: transform 0.2s ease;
        }

        .detail-specifications-card-block.specifications-grid-card {
            border: 1px solid var(--border-card);
            border-radius: 16px;
        }

        .meta-technical-attributes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 14px;
            column-gap: 12px;
        }

        .meta-technical-attributes-grid div {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .meta-technical-attributes-grid .grid-full-width {
            grid-column: span 2;
        }

        .meta-technical-attributes-grid label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .meta-technical-attributes-grid strong {
            font-size: 13px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .attr-icon-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .doc-icon {
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
        }

        .card-action-footer-row {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .footer-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            text-align: center;
            border: 1.5px solid var(--purple-main);
            color: var(--purple-main);
        }

        .similar-ads-section-header {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 12px 0 4px 0;
        }

        .similar-ads-horizontal-scroll-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .similar-ads-horizontal-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .similar-ads-horizontal-scroll-container .ad-card-wrapper {
            min-width: 210px;
            max-width: 210px;
            flex-shrink: 0;
        }

        /* --- BASE LAYOUT TOKENS --- */
        .header-logo-brand-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .search-bar-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-bar-input-wrapper input {
            width: 100%;
            background-color: var(--bg-search);
            border: none;
            border-radius: 24px;
            padding: 12px 16px 12px 46px;
            font-size: 14px;
            outline: none;
            color: var(--text-dark);
        }

        .search-bar-input-wrapper .search-lens-icon-asset {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .hero-banner-carousel {
            margin: 4px var(--screen-edge-margin) 16px var(--screen-edge-margin);
            height: 180px;
            background-color: #500e8c;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(93, 16, 162, 0.15);
        }

        .carousel-scrolling-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.45, 0, 0.55, 1);
        }

        .carousel-slide-card {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 20px 24px;
            position: relative;
            box-sizing: border-box;
            cursor: pointer;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        .carousel-slide-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(41, 5, 74, 0.95) 55%, rgba(41, 5, 74, 0.5) 100%);
            z-index: 1;
        }

        .carousel-slide-card h4 {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            z-index: 2;
            max-width: 85%;
            line-height: 1.4;
        }

        .carousel-slide-card p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.95);
            max-width: 85%;
            line-height: 1.4;
            z-index: 2;
        }

        .section-heading-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px var(--screen-edge-margin) 12px var(--screen-edge-margin);
        }

        .section-heading-row h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .section-heading-row .arrow-nav-trigger {
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--purple-main);
        }

        .horizontal-scrollable-categories {
            display: flex;
            gap: 14px;
            padding: 4px var(--screen-edge-margin) 12px var(--screen-edge-margin);
            overflow-x: auto;
        }
        .horizontal-scrollable-categories::-webkit-scrollbar { display: none; }

        /* Categories section */
        .category-square-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-width: 80px;
            text-align: center;
            gap: 8px;
        }

        .category-square-icon-box {
            width: 65px;
            height: 65px;
            background-color: #500E8C;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
            color: #ffffff;
        }

        .category-square-icon-box img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .category-square-card span {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .category-square-card:active 
        .category-square-icon-box {
            transform: scale(0.95);
        }

        .adaptive-ads-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 var(--screen-edge-margin) 16px var(--screen-edge-margin);
        }

        @media (min-width: 650px) {
            .adaptive-ads-grid-container { grid-template-columns: repeat(3, 1fr); gap: 16px; }
        }
        @media (min-width: 950px) {
            .adaptive-ads-grid-container { grid-template-columns: repeat(4, 1fr); }
        }

        .ad-card-wrapper {
            background-color: var(--card-sub-bg);
            border: 1px solid var(--border-card);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 14px var(--shadow-card);
            cursor: pointer;
        }

        .ad-card-media-box {
            width: 100%;
            aspect-ratio: 1.25 / 1;
            overflow: hidden;
        }

        .ad-card-media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-card-information-box {
            padding: 14px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .ad-card-main-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--purple-text-title);
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .ad-card-subtitle-text {
            font-size: 13px;
            color: var(--text-dark);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .badge-date-container-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .type-document-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            color: var(--badge-text-fallback);
            background-color: var(--badge-bg-fallback);
            padding: 5px 10px;
            border-radius: 6px;
            height: 26px;
        }

        .posted-calendar-date-label {
            font-size: 11.5px;
            color: var(--text-muted);
        }

        .verification-status-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 12px;
        }

        .verification-badge-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--purple-main);
        }

        .verification-badge-group img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            vertical-align: middle;
        }

        .extra-modifier-tag-text {
            font-size: 11.5px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .ad-card-footer-location-metrics {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            padding-top: 10px;
            border-top: 1px solid var(--border-card);
            font-size: 11.5px;
            color: var(--text-muted);
            gap: 4px;
        }

        @media(min-width: 360px) {
            .ad-card-footer-location-metrics { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .sub-header-navigation-sticky-row h1 { font-size: 15px; font-weight: 700; color: var(--text-dark); }

        .vertical-categories-stack-wrapper { display: flex; flex-direction: column; padding: 10px var(--screen-edge-margin); }

        .category-list-row-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-card);
            cursor: pointer;
        }

        .category-list-row-item .icon-wrapper-box {
            width: 38px;
            height: 38px;
            background: var(--list-row-icon-bg);
            border-radius: 10px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--purple-main);
        }

        .category-list-row-item span { font-size: 13.5px; font-weight: 600; color: var(--text-dark); }

        .runtime-filters-capsule-row { display: flex; gap: 8px; padding: 12px var(--screen-edge-margin); overflow-x: auto; }
        .runtime-filters-capsule-row::-webkit-scrollbar { display: none; }

        .filter-capsule-toggle-trigger {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--purple-main);
            background: transparent;
            color: var(--purple-main);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }

        .filter-counter-metrics-bar { 
            padding: 4px var(--screen-edge-margin) 12px var(--screen-edge-margin); 
            font-size: 11.5px; 
            color: var(--text-muted); 
        }
        
        /* ==========================================
           BOTTOM PINNED GLOBAL TAB MENU LAYOUT
        ========================================== */
        .bottom-nav {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 80px;
            background: var(--card-sub-bg); 
            border-top: 1px solid var(--border-card); 
            display: flex;
            align-items: center; 
            justify-content: space-around; 
            z-index: 10;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02); 
            padding: 0 40px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            width: 100px;
            padding: 8px 0;
        }

        .nav-item.active { color: var(--purple-main); font-weight: 600; }
        
        .bottom-nav .nav-item i {
            font-size: 26px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }
        .bottom-nav .nav-item.active i {
            font-size: 32px;
            color: var(--purple-main);
        }

        .bottom-nav .nav-item span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .bottom-nav .nav-item.active span {
            color: var(--purple-main);
        }

        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .bottom-nav { padding: 0; height: 72px; }
            .nav-item { font-size: 11px; width: auto; }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <section id="view-home" class="view-pane active">
            <header class="home-search-header">
                <div class="header-logo-brand-box" onclick="location.reload()">
                    <img src="icons/Open Logo.png" alt="Open Jobs Ghana Logo">
                </div>
                <div class="search-bar-input-wrapper">
                    <input type="text" id="runtime-global-search" placeholder="Search ads, jobs, CVs..." onkeydown="handleSearchSubmit(event)">
                    <div class="search-lens-icon-asset" onclick="triggerManualSearchSubmit()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#8e8e93" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </div>
                </div>
            </header>

            <div class="hero-banner-carousel">
                <div class="carousel-scrolling-track" id="verified-trending-carousel-track"></div>
            </div>

            <div class="section-heading-row">
                <h2>Explore categories</h2>
                <div class="arrow-nav-trigger" onclick="navigateToPane('view-categories')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </div>
            <div class="horizontal-scrollable-categories" id="home-categories-shortcut-track"></div>

            <!-- DYNAMIC SECTIONS LOADED VIA ROLE ENGINE -->
            <div id="dynamic-role-sections-container">
                <div class="section-heading-row"><h2 id="dynamic-feed-title">For you</h2></div>
                <div class="adaptive-ads-grid-container" id="feed-for-you"></div>

                <div class="section-heading-row" id="heading-track-one">
                    <h2 id="title-track-one">Trending Jobs</h2>
                    <div class="arrow-nav-trigger" id="arrow-track-one">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                </div>
                <div class="adaptive-ads-grid-container" id="feed-trending-jobs"></div>

                <div class="section-heading-row" id="heading-track-two">
                    <h2 id="title-track-two">Trending CVs</h2>
                    <div class="arrow-nav-trigger" id="arrow-track-two">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                </div>
                <div class="adaptive-ads-grid-container" id="feed-trending-cvs"></div>
            </div>

            <div class="section-heading-row">
                <h2 id="title-track-all">Discover all ads</h2>

        function applyAdaptiveUserRoleUI() {
            const searchInput = document.getElementById('runtime-global-search');

            const titleTrackOne = document.getElementById('title-track-one');
            const titleTrackTwo = document.getElementById('title-track-two');
            const titleTrackAll = document.getElementById('title-track-all');
            
            const arrowTrackOne = document.getElementById('arrow-track-one');
            const arrowTrackTwo = document.getElementById('arrow-track-two');

            if (userRole === 'Business Owner') {
                if(searchInput) searchInput.placeholder = "Search candidate files, CVs, specialists...";
                if(feedTitle) feedTitle.innerText = "Top Talent For You";
                
                if(titleTrackOne) titleTrackOne.innerText = "Available Specialists (CVs)";
                if(arrowTrackOne) arrowTrackOne.setAttribute('onclick', "openFilteredListWithContext('CV', 'Available Specialists')");
                
                if(titleTrackTwo) titleTrackTwo.innerText = "Active Intern Candidates";
                if(arrowTrackTwo) arrowTrackTwo.setAttribute('onclick', "openFilteredListWithContext('CV', 'Active Intern Candidates')");
                
                if(titleTrackAll) titleTrackAll.innerText = "Discover all available talent profiles";
            } 
            else if (userRole === 'Freelancer') {
                if(searchInput) searchInput.placeholder = "Search contract projects, gigs, retainers...";
                if(feedTitle) feedTitle.innerText = "Contract Work For You";
                
                if(titleTrackOne) titleTrackOne.innerText = "Trending Projects & Gigs";
                if(arrowTrackOne) arrowTrackOne.setAttribute('onclick', "openFilteredListWithContext('Job', 'Trending Projects')");
                
                if(titleTrackTwo) titleTrackTwo.innerText = "Available Subcontract Partners (CVs)";

                if(titleTrackAll) titleTrackAll.innerText = "Discover all live projects";
            }

                if(searchInput) searchInput.placeholder = "Search student placements, attachments...";
                if(feedTitle) feedTitle.innerText = "Placements For You";
                
                if(titleTrackOne) titleTrackOne.innerText = "Trending Intern Vacancies";
                if(arrowTrackOne) arrowTrackOne.setAttribute('onclick', "openFilteredListWithContext('Job', 'Intern Vacancies')");
                
                if(titleTrackTwo) titleTrackTwo.innerText = "Peer Student Profiles (CVs)";
                if(arrowTrackTwo) arrowTrackTwo.setAttribute('onclick', "openFilteredListWithContext('CV', 'Peer Student Profiles')");
                
                if(titleTrackAll) titleTrackAll.innerText = "Discover all entry tracks";
            } 
            else { // Jobseeker (Default)
                if(searchInput) searchInput.placeholder = "Search ads, jobs, positions...";
                if(feedTitle) feedTitle.innerText = "Recommended Openings For You";
                
                if(titleTrackOne) titleTrackOne.innerText = "Trending Jobs";
                if(arrowTrackOne) arrowTrackOne.setAttribute('onclick', "openFilteredListWithContext('Job', 'Trending Jobs')");
                
                if(titleTrackTwo) titleTrackTwo.innerText = "Trending Professional CVs";
                if(arrowTrackTwo) arrowTrackTwo.setAttribute('onclick', "openFilteredListWithContext('CV', 'Trending CVs')");
                
                if(titleTrackAll) titleTrackAll.innerText = "Discover all ads";

        function navigateToPane(targetPaneId) {
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
            const destination = document.getElementById(targetPaneId);
            if(destination) {
                destination.classList.add('active');
                if(historyStack[historyStack.length - 1] !== targetPaneId) {
                    historyStack.push(targetPaneId);
                }
            }
            window.scrollTo(0,0);
        }

        function handlePaneBackNavigation() {
            if(historyStack.length > 1) {
                historyStack.pop();
                const previousPane = historyStack[historyStack.length - 1];
                document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
                document.getElementById(previousPane).classList.add('active');
            }
        }

        function setActiveNav() {
            const currentPage = window.location.pathname.split('/').pop() || 'home.html';
            const navItems = document.querySelectorAll('.nav-item[data-route]');
            navItems.forEach(item => item.classList.remove('active'));

            const routeMap = {
                'add.html': 'add',
                'saved.html': 'saved',
                'home.html': 'home',
                'message.html': 'messages',
                'settings.html': 'settings'
            };

            const currentRoute = routeMap[currentPage];
            if(currentRoute) {
                const activeItem = document.querySelector(`.nav-item[data-route="${currentRoute}"]`);
                if(activeItem) activeItem.classList.add('active');
            }
        }

        function initializeCarouselTrack() {
            const track = document.getElementById('verified-trending-carousel-track');
            const verifiedItems = PLATFORM_DATABASE.filter(i => i.verified);
            if (!track) return;
            track.innerHTML = '';
    
            verifiedItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'carousel-slide-card';
                card.style.backgroundImage = `url('${item.image}')`;
                card.onclick = () => openAdDetailPresentation(item.id);
                card.innerHTML = `
                    <h4>${item.title}</h4>
                    <p>${item.subtitle}</p>
                `;
                track.appendChild(card);
            });

            startCarouselAutoPlay(verifiedItems.length);
        }

        function startCarouselAutoPlay(totalSlides) {
            clearInterval(carouselInterval);
            if (totalSlides <= 1) return;

            carouselInterval = setInterval(() => {
                const track = document.getElementById('verified-trending-carousel-track');
                if (!track) return;
                carouselIndex++;
                if (carouselIndex >= totalSlides) {
                    carouselIndex = 0;
                }
                track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            }, 5000);
        }

        function buildAdHTMLComponent(item) {
            let labelTypeText = item.type;
            if (item.type === 'Job' && item.experience === 'Internship') labelTypeText = 'Internship';
            
            return `
                <div class="ad-card-wrapper" onclick="openAdDetailPresentation('${item.id}')">
                    <div class="ad-card-media-box">
                        <img src="${item.image}" alt="Media Card Visual Assets">
                    </div>
                    <div class="ad-card-information-box">
                        <h3 class="ad-card-main-title">${item.title}</h3>
                        <p class="ad-card-subtitle-text">${item.subtitle}</p>
                        
                        <div class="badge-date-container-row">
                            <span class="type-document-tag">${labelTypeText}</span>
                            <span class="posted-calendar-date-label">${item.date}</span>
                        </div>

                        <div class="verification-status-meta-row">

                            <div class="verification-badge-group">
                                <img src="icons/verify.png" alt="Verified Status Check" />
                                <span>Verified</span>
                            </div>` : '<div></div>'}

        function renderDashboardFeeds() {
            // 1. Contextual feed data loading based on User Track Selection
            let forYouData = [...PLATFORM_DATABASE];
            let trackOneData = [];
            let trackTwoData = [];

            if (userRole === 'Business Owner') {
                forYouData = PLATFORM_DATABASE.filter(i => i.type === 'CV');
                trackOneData = PLATFORM_DATABASE.filter(i => i.type === 'CV' && i.experience !== 'Internship');
                trackTwoData = PLATFORM_DATABASE.filter(i => i.type === 'CV' && i.experience === 'Internship');
            } 
            else if (userRole === 'Freelancer') {
                forYouData = PLATFORM_DATABASE.filter(i => i.category === 'Travel & Logistics' || i.type === 'Job');
                trackOneData = PLATFORM_DATABASE.filter(i => i.type === 'Job');
                trackTwoData = PLATFORM_DATABASE.filter(i => i.type === 'CV');
            } 
            else if (userRole === 'Internship Seeker') {
                forYouData = PLATFORM_DATABASE.filter(i => i.experience === 'Internship');
                trackOneData = PLATFORM_DATABASE.filter(i => i.type === 'Job' && i.experience === 'Internship');
                trackTwoData = PLATFORM_DATABASE.filter(i => i.type === 'CV' && i.experience === 'Internship');
            } 
            else { // Jobseeker
                forYouData = PLATFORM_DATABASE.filter(i => i.type === 'Job');
                trackOneData = PLATFORM_DATABASE.filter(i => i.type === 'Job');
                trackTwoData = PLATFORM_DATABASE.filter(i => i.type === 'CV');
            }

            // Fallbacks for layout safety
            if(forYouData.length === 0) forYouData = PLATFORM_DATABASE.slice(0, 3);
            if(trackOneData.length === 0) trackOneData = PLATFORM_DATABASE.filter(i => i.type === 'Job');
            if(trackTwoData.length === 0) trackTwoData = PLATFORM_DATABASE.filter(i => i.type === 'CV');

            document.getElementById('feed-for-you').innerHTML = forYouData.slice(0, 4).map(buildAdHTMLComponent).join('');
            document.getElementById('feed-trending-jobs').innerHTML = trackOneData.slice(0, 4).map(buildAdHTMLComponent).join('');
            document.getElementById('feed-trending-cvs').innerHTML = trackTwoData.slice(0, 4).map(buildAdHTMLComponent).join('');
            document.getElementById('feed-discover-all').innerHTML = PLATFORM_DATABASE.map(buildAdHTMLComponent).join('');
        }

        function openFilteredListWithContext(type, titleOrCategoryName) {
            currentFilterType = type;
            document.getElementById('filter-type-trigger-btn').innerText = `Type: ${type}`;
            
            const matchesCategory = CATEGORIES_DATABASE.some(c => c.name === titleOrCategoryName);
            if (matchesCategory) {
                currentFilterCategory = titleOrCategoryName;
                document.getElementById('filtered-view-title-label').innerText = titleOrCategoryName;
            } else {
                currentFilterCategory = "All";
                document.getElementById('filtered-view-title-label').innerText = titleOrCategoryName;
            }
            
            executeRuntimeFilterEngine();
            navigateToPane('view-filtered-list');
        }

        function cycleTypeRuntimeFilter() {
            if (currentFilterType === "All") currentFilterType = "Job";
            else if (currentFilterType === "Job") currentFilterType = "CV";
            else currentFilterType = "All";
            
            document.getElementById('filter-type-trigger-btn').innerText = `Type: ${currentFilterType}`;
            executeRuntimeFilterEngine();
        }

        function executeRuntimeFilterEngine() {
            let records = PLATFORM_DATABASE;
            
            if (currentFilterType !== "All") {
                records = records.filter(r => r.type === currentFilterType);
            }
            if (currentFilterCategory !== "All") {
                records = records.filter(r => r.category === currentFilterCategory);
            }

            const searchInput = document.getElementById('runtime-global-search').value.trim().toLowerCase();
            if (searchInput) {
                records = records.filter(r => 
                    r.title.toLowerCase().includes(searchInput) || 
                    r.subtitle.toLowerCase().includes(searchInput) ||
                    r.description.toLowerCase().includes(searchInput)
                );
            }

            document.getElementById('filter-field-trigger-btn').innerText = currentFilterCategory === "All" ? "All Fields" : currentFilterCategory;
            document.getElementById('filter-results-counter').innerText = `${records.length} total profiles found`;
            document.getElementById('feed-filtered-list-output').innerHTML = records.map(buildAdHTMLComponent).join('');
        }

            openFilteredListWithContext('All', 'Search Results');
        }

        function openAdDetailPresentation(itemId) {
            const target = PLATFORM_DATABASE.find(i => i.id === itemId);
            if (!target) return;

            currentAdOwner = { name: target.title, avatar: target.image };
            currentActiveItemData = target;

            currentAdSlideIndex = 0;
            const slider = document.getElementById('imageSlider');
            if (slider) slider.scrollLeft = 0;
            updateSliderDots();

            document.getElementById('detail-pane-image').src = target.image;
            document.getElementById('detail-pane-title').innerText = target.title;
            document.getElementById('detail-pane-subtitle').innerText = target.subtitle;
            document.getElementById('detail-pane-description').innerText = target.description;

            document.getElementById('meta-attr-type').innerText = target.type;
            document.getElementById('meta-attr-verified').innerText = target.verified ? "Verified System Entry" : "Standard Entry";
            document.getElementById('meta-attr-category').innerText = target.category;
            document.getElementById('meta-attr-experience').innerText = target.experience || "Entry level";
            document.getElementById('meta-attr-sub-category').innerText = target.subCategory || "General Professional";
            document.getElementById('meta-attr-date').innerText = target.date;
            document.getElementById('meta-attr-location').innerText = target.location;

            // Contextual Copy adaptation inside Details Pane Footer Action button
            const actionMessageBtn = document.getElementById('ad-detail-message-action-trigger');
            const saveTextBtn = document.getElementById('save-ad-text');
            const headingSimilar = document.getElementById('detail-similar-heading');

            if (userRole === 'Business Owner') {
                if(actionMessageBtn) actionMessageBtn.innerText = "Interview Candidate";
                if(saveTextBtn && saveTextBtn.innerText !== "Saved") saveTextBtn.innerText = "Save Profile";
                if(headingSimilar) headingSimilar.innerText = "See matching candidate files";
            } else if (userRole === 'Freelancer') {
                if(actionMessageBtn) actionMessageBtn.innerText = "Submit Contract Proposal";
                if(saveTextBtn && saveTextBtn.innerText !== "Saved") saveTextBtn.innerText = "Bookmark Gig";
                if(headingSimilar) headingSimilar.innerText = "See similar projects";
            } else {
                if(actionMessageBtn) actionMessageBtn.innerText = "Message Recruiter";
                if(saveTextBtn && saveTextBtn.innerText !== "Saved") saveTextBtn.innerText = "Save ad";
                if(headingSimilar) headingSimilar.innerText = "See similar ads";
            }

            updateSaveButtonUI(itemId);
            renderSimilarAds(target);
            navigateToPane('view-ad-detail');
        }

        function moveAdSlide(direction) {
            const slider = document.getElementById('imageSlider');
            const slides = document.querySelectorAll('.detail-pane-slide-image');
            if (!slider || slides.length === 0) return;

            currentAdSlideIndex += direction;
            if (currentAdSlideIndex >= slides.length) currentAdSlideIndex = 0;
            if (currentAdSlideIndex < 0) currentAdSlideIndex = slides.length - 1;

            slider.scrollLeft = slider.offsetWidth * currentAdSlideIndex;
            updateSliderDots();
        }

        function updateSliderDots() {
            const dots = document.querySelectorAll('#sliderDots .dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentAdSlideIndex));
        }

        function initializeAdDetailInteractions() {
            const seeMore = document.getElementById('description-see-more');
            const desc = document.getElementById('detail-pane-description');
            if (seeMore && desc) {
                seeMore.onclick = () => {
                    const isExpanded = desc.classList.toggle('expanded');
                    seeMore.querySelector('span').innerText = isExpanded ? "See less" : "See more";
                    seeMore.querySelector('svg').style.transform = isExpanded ? "rotate(180deg)" : "rotate(0deg)";
                };
            }

            const saveBtn = document.getElementById('btn-save-ad-toggle');
            if (saveBtn) {
                saveBtn.onclick = () => {
                    if (!currentActiveItemData) return;
                    let savedItems = JSON.parse(localStorage.getItem('OPEN_SAVED_ITEMS')) || [];
                    const index = savedItems.findIndex(i => i.id === currentActiveItemData.id);
                    
                    if (index > -1) {
                        savedItems.splice(index, 1);
                        alert('Removed from your saved collection.');
                    } else {
                        savedItems.push(currentActiveItemData);
                        alert('Successfully saved!');
                    }
                    localStorage.setItem('OPEN_SAVED_ITEMS', JSON.stringify(savedItems));
                    updateSaveButtonUI(currentActiveItemData.id);
                };
            }
        }

        function updateSaveButtonUI(itemId) {
            const savedItems = JSON.parse(localStorage.getItem('OPEN_SAVED_ITEMS')) || [];
            const isSaved = savedItems.some(i => i.id === itemId);
            const textNode = document.getElementById('save-ad-text');
            const iconNode = document.querySelector('.bookmark-icon');
            
            if (textNode) {
                if (isSaved) {
                    textNode.innerText = "Saved";
                } else {
                    textNode.innerText = (userRole === 'Business Owner') ? "Save Profile" : "Save ad";
                }
            }
            if (iconNode) iconNode.style.fill = isSaved ? "var(--purple-main)" : "none";
        }

        function renderSimilarAds(activeItem) {
            const track = document.getElementById('detail-similar-ads-track');
            if (!track) return;

            const similar = PLATFORM_DATABASE.filter(i => i.category === activeItem.category && i.id !== activeItem.id);
            if (similar.length === 0) {
                track.innerHTML = `<p style="font-size:12px; color:var(--text-muted); padding:10px 0;">No matching contextual variants found.</p>`;
                return;
            }
            track.innerHTML = similar.map(buildAdHTMLComponent).join('');
        }

        function routeAdPresenterToChatThread() {
            if (!currentAdOwner){
                alert("Error: No listing owner found");
                return;
            }
            const url = `message.html?name=${encodeURIComponent(currentAdOwner.name)}&avatar=${encodeURIComponent(currentAdOwner.avatar)}`;
            window.location.href = url;
        }
    </script>
</body>
</html>
