<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>Open Jobs Ghana | Saved</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ==========================================
           BOTTOM PINNED GLOBAL TAB MENU LAYOUT
        ========================================== */
        .bottom-nav {
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 80px;
            background: #FFF; 
            border-top: 1px solid #E5E7EB; 
            display: flex;
            align-items: center; 
            justify-content: space-around; 
            z-index: 10;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02); 
            padding: 0 40px;
        }

        .nav-item {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            color: #6B7280; 
            font-size: 13px; 
            font-weight: 500; 
            text-decoration: none; 
            cursor: pointer;
            width: 100px; 
            padding: 8px 0;
        }

        .nav-item.active { color: #500E8C; font-weight: 600; }
        
        .bottom-nav .nav-item i {
            font-size: 26px;
            color: #6B7280;
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }

        .bottom-nav .nav-item.active i {
            font-size: 32px;
            color: #500E8C;
        }

        .bottom-nav .nav-item[data-route="add"] i {
            font-size: 32px;
            color: #500E8C;
        }
            
        .bottom-nav .nav-item span {
            font-size: 11px;
            font-weight: 600;
            color: #6B7280;
            transition: color 0.3s ease;
        }

        .bottom-nav .nav-item.active span {
            color: #500E8C;
        }
    </style>
</head>
<body>
    <div id="app-container">
         <!-- ==========================================
            BOTTOM PINNED GLOBAL TAB MENU LAYOUT
        ========================================== -->
        <div class="bottom-nav">
            <div class="nav-item tab-trigger" data-route="home" onclick="window.location.href='home.html'">
                <i class="ph ph-house"></i>
                <span>Home</span>
            </div>

            <div class="nav-item tab-trigger" data-route="messages" onclick="window.location.href='message.html'">
                <i class="ph ph-chats-circle"></i>
                <span>Messages</span>
            </div>

            <div class="nav-item tab-trigger" data-route="add" onclick="window.location.href='add.html'">
                <i class="ph ph-plus-circle"></i>
                <span>Add</span>
            </div>

            <div class="nav-item tab-trigger" data-route="saved" onclick="window.location.href='saved.html'">
                <i class="ph ph-bookmark-simple"></i>
                <span>Saved</span>
            </div>

            <div class="nav-item tab-trigger" data-route="settings" onclick="window.location.href='settings.html'">
                <i class="ph ph-gear"></i>
                <span>Settings</span>
            </div>
        </div>
    </div>
</body>
<script>
    function setActiveNav() {
        const currentPage = window.location.pathname.split('/').pop() || 'message.html';
        const navItems = document.querySelectorAll('.nav-item[data-route]');
        navItems.forEach(item => item.classList.remove('active'));
        
        const routeMap = {
            'add.html': 'add',
            'saved.html': 'saved',
            'home.html': 'home',
            'message.html': 'messages',
            'settings.html': 'settings'
        };
        
        const currentRoute = routeMap[currentPage];
        if(currentRoute) {
            const activeItem = document.querySelector(`.nav-item[data-route="${currentRoute}"]`);
            if(activeItem) activeItem.classList.add('active');
        }
    }
</script>
</html>
