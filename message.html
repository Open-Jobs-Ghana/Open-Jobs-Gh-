<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>Open Jobs Ghana | Messages</title>
    <style>
         :root {
            --purple-main: #500E8c;
            --purple-text-title: #4a008c;
            --bg-light: #ffffff;
            --bg-search: #f1f2f6;
            --text-dark: #1a1a1a;
            --text-muted: #8e8e93;
            --border-card: #f2f2f7;
            --shadow-card: rgba(0, 0, 0, 0.06);
            --screen-edge-margin: 16px;
        }

       /* Premium Dark Theme Variable Overrides */
        .dark-theme {
            --bg-light: #121212;
            --bg-search: #1e1e1e;
            --text-dark: #f5f5f5;
            --text-muted: #a0a0a5;
            --border-card: #2d2d30;
            --shadow-card: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        /* Dynamic Unread Badge Style Configuration */
        .navigation-action-item .nav-unread-green-dot {
            position: absolute;
            top: 10px;
            right: 32%;
            width: 9px;
            height: 9px;
            background-color: #26d07c;
            border-radius: 50%;
            border: 1.5px solid var(--bg-light);
            display: none;
        }

        /* ==========================================================================
           --- NAMESPACED MESSAGES ARCHITECTURE SYSTEM (BRANDED HEADER ENHANCED) ---
           ========================================================================== */
        .msg-screen-layout {
            padding: 0;
            background-color: var(--bg-light);
            width: 100%;
        }

        /* Pure Identity System Branded Top Navbar Wrapper Block */
        .msg-screen-layout .branded-identity-header-container {
            background-color: var(--purple-main);
            padding: 24px var(--screen-edge-margin) 16px var(--screen-edge-margin);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg-screen-layout .msg-search-action-header-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .msg-screen-layout .msg-search-input-frame {
            position: relative;
            flex: 1;
        }

        .msg-screen-layout .msg-search-input-frame input {
            width: 100%;
            background-color: var(--bg-search);
            border: none;
            border-radius: 24px;
            padding: 12px 16px 12px 46px;
            font-size: 14px;
            outline: none;
            color: var(--text-dark);
        }

        .dark-theme .msg-screen-layout .msg-search-input-frame input {
            background-color: #2a2a2d;
        }

        .msg-screen-layout .msg-search-input-frame input::placeholder {
            color: var(--text-muted);
        }

        .msg-screen-layout .msg-search-input-frame .lens-svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: var(--text-muted);
        }

        /* Filter Adjustment Slider Engine Control Svg Trigger Button */
        .msg-screen-layout .msg-sort-dropdown-trigger {
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
        }

        /* Central Capsule Selection Switch Navigation Container Row */
        .msg-screen-layout .capsule-pill-navigation-container {
            display: flex;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px;
            border-radius: 30px;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.08);
            margin-top: 4px;
        }

        .msg-screen-layout .tab-nav-link {
            flex: 1;
            padding: 10px 0;
            font-size: 13.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: center;
            border-radius: 25px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .msg-screen-layout .tab-nav-link.active-link-node {
            color: #000000 !important;
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
        }

        .dark-theme .msg-screen-layout .tab-nav-link.active-link-node {
            color: #ffffff !important;
            background: #2a2a2d;
        }

        /* Custom Sort Dropdown Options Popover Menu Panel */
        .msg-screen-layout .sort-options-popover-menu {
            display: none;
            position: absolute;
            right: var(--screen-edge-margin);
            top: 75px;
            background: var(--bg-light);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            box-shadow: 0 6px 20px var(--shadow-card);
            z-index: 60;
            overflow: hidden;
            width: 150px;
        }

        .msg-screen-layout .sort-options-popover-menu.open { display: block; }

        .msg-screen-layout .sort-options-popover-menu button {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: none;
            text-align: left;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-dark);
        }

        .msg-screen-layout .sort-options-popover-menu button:hover { 
            background: var(--bg-search); 
        }

        /* Chat Threads Core Feed Track */
        .msg-screen-layout .msg-threads-scroll-track {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding-top: 8px;
        }

        /* Channel Item Cell Frame Component */
        .msg-screen-layout .chat-thread-channel-cell {
            display: flex;
            padding: 16px var(--screen-edge-margin);
            gap: 14px;
            border-bottom: 1px solid var(--border-card);
            cursor: pointer;
            align-items: center;
            transition: background 0.2s ease;
        }

        .msg-screen-layout .chat-thread-channel-cell:active { 
            background-color: var(--bg-search); 
        }

        .msg-screen-layout .thread-avatar-wrapper {
            position: relative;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: var(--bg-search);
            flex-shrink: 0;
        }

        .msg-screen-layout .thread-avatar-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .msg-screen-layout .thread-meta-details-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .msg-screen-layout .thread-upper-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .msg-screen-layout .thread-profile-title {
            font-size: 14.5px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .msg-screen-layout .thread-timestamp-label {
            font-size: 11.5px;
            color: var(--text-muted);
        }

        .msg-screen-layout .thread-lower-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .msg-screen-layout .thread-message-snippet {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-transform: none;
            text-overflow: ellipsis;
        }

        /* Unread Notification Numeric Alert Pill Struct */
        .msg-screen-layout .thread-unread-numeric-alert-pill {
            background-color: var(--purple-main);
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        /* Delivered Single/Double Network Tick Checks */
        .msg-screen-layout .cell-delivery-status-ticks-svg {
            width: 15px;
            height: 15px;
            fill: none;
            stroke: #b0b0b5;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .msg-screen-layout .chat-thread-channel-cell.unread-thread-state .thread-message-snippet {
            color: var(--text-dark);
            font-weight: 500;
        }

        .msg-screen-layout .chat-thread-channel-cell.unread-thread-state .thread-timestamp-label {
            color: var(--purple-main);
            font-weight: 600;
        }

        /* Empty Feed System Handler Box */
        .msg-screen-layout .empty-inbox-placeholder-box {
            padding: 80px var(--screen-edge-margin);
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .msg-screen-layout .empty-inbox-placeholder-box p { font-size: 13px; }

        /* ==========================================================================
           --- CHAT INTERFACE WINDOW COMPONENT LAYOUT ---
           ========================================================================== */
        .chat-interface-layout {
            display: flex;
            flex-direction: column;
            background-color: var(--bg-light);
            height: 100vh;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 200;
        }

        /* Top Bar Segment Profile Info Header Row */
        .chat-interface-layout .chat-window-top-navigation-bar {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-card);
            background: var(--bg-light);
            gap: 15px;
            height: 60px;
        }

        .chat-interface-layout .chat-window-back-btn {
            font-size: 18px;
            font-weight: 700;
            color: var(--purple-main);
            cursor: pointer;
            padding: 4px 8px 4px 0;
        }

        .chat-interface-layout .chat-header-profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--bg-search);
        }

        .chat-interface-layout .chat-header-meta-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding-right: 10px;
        }

        .chat-interface-layout .chat-header-interlocutor-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .chat-interface-layout .chat-header-status-presence {
            font-size: 11px;
            color: #26d07c;
            font-weight: 500;
        }

        /* Central Messages Bubbles Render Loop Stream */
        .chat-interface-layout .chat-bubbles-timeline-scroll-stream {
            flex: 1;
            overflow-y: auto;
            padding: 16px var(--screen-edge-margin);
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Speech Container Blocks Core Structuring */
        .chat-interface-layout .chat-message-row-node {
            display: flex;
            width: 100%;
            position: relative;
        }

        .chat-interface-layout .chat-message-row-node.incoming-node-direction { justify-content: flex-start; }
        .chat-interface-layout .chat-message-row-node.outgoing-node-direction { justify-content: flex-end; }

        .chat-interface-layout .speech-bubble-payload {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.45;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .chat-interface-layout .chat-message-row-node.incoming-node-direction .speech-bubble-payload {
            background-color: var(--bg-search);
            color: var(--text-dark);
            border-top-left-radius: 4px;
        }

        .chat-interface-layout .chat-message-row-node.outgoing-node-direction .speech-bubble-payload {
            background-color: var(--purple-main);
            color: #ffffff;
            border-top-right-radius: 4px;
        }

        /* Destructive Media Action Buttons for Audio Clips */
        .chat-interface-layout .voice-msg-trash-delete-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            margin-left: auto;
            display: flex;
            align-items: center;
            margin-top: 6px;
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
            transition: color 0.2s;
        }
       
        .chat-interface-layout .voice-msg-trash-delete-btn:hover {
            color: #ff3b30;
        }

        .chat-interface-layout .speech-bubble-deleted-fallback {
            font-style: italic;
            color: var(--text-muted) !important;
            background-color: var(--bg-search) !important;
            border-radius: 8px !important;
            border: 1px dashed var(--border-card);
            padding: 8px 14px;
            font-size: 13px;
        }

        /* Footer Metadata Layer indicators inside message bubbles */
        .chat-interface-layout .speech-bubble-meta-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            align-self: flex-end;
        }

        .chat-interface-layout .speech-bubble-timestamp {
            font-size: 10px;
            opacity: 0.65;
        }

        /* Delivery Network Checks Representation Elements */
        .chat-interface-layout .speech-delivery-status-check-svg {
            width: 13px;
            height: 13px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Interactive Controls Footer System Anchor */
        .chat-interface-layout .chat-input-controls-dock-footer {
            border-top: 1px solid var(--border-card);
            padding: 15px 20px;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-interface-layout .chat-media-attachment-action-trigger {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input-textarea-element-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .chat-interface-layout .chat-input-textarea-element-wrapper input {
            width: 100%;
            background-color: var(--bg-search);
            border: none;
            border-radius: 20px;
            padding: 10px 42px 10px 16px;
            font-size: 13.5px;
            outline: none;
            color: var(--text-dark);
        }

        /* Emulated voice recording overlay timeline track */
        .chat-interface-layout .audio-recording-active-track-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-search);
            border-radius: 20px;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            color: #ff3b30;
            font-size: 12.5px;
            font-weight: 600;
            animation: pulseRecord 1s infinite alternate;
        }

        @keyframes pulseRecord {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }

        .chat-interface-layout .chat-voice-note-recorder-action-trigger {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-interface-layout .chat-voice-note-recorder-action-trigger.recording-active {
            color: #ff3b30;
        }

        .chat-interface-layout .chat-message-dispatch-send-btn {
            background-color: var(--purple-main);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ==========================================
           BOTTOM PINNED GLOBAL TAB MENU LAYOUT
        ========================================== */
        .bottom-nav {
            position: fixed;
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 80px;
            background: var(--bg-light); 
            border-top: 1px solid var(--border-card); 
            display: flex;
            align-items: center; 
            justify-content: space-around;
            z-index: 10;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02); 
            padding: 0 40px;
        }

        .nav-item {
            display: flex;
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            color: var(--text-muted); 
            font-size: 13px; 
            font-weight: 500; 
            text-decoration: none; 
            cursor: pointer;
            width: 100px;
            padding: 8px 0;
        }


        .nav-item.active { 
            color: var(--purple-main); 
            font-weight: 600;
        }
        
        .bottom-nav .nav-item i {
            font-size: 26px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }

        .bottom-nav .nav-item.active i {
            font-size: 32px;
            color: var(--purple-main);
        }

        .bottom-nav .nav-item span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .bottom-nav .nav-item.active span {
            color: var(--purple-main);
        }

        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .settings-list-container { max-width: 100%; border-radius: 12px; }
            .settings-item { padding: 16px; }
            .bottom-nav { padding: 0; height: 72px; }
            .nav-item { font-size: 11px; width: auto; }
        }

    </style>
</head>
<body>

<div id="app-container">
    <section id="view-messages" class="view-pane msg-screen-layout">
        <div class="branded-identity-header-container">
            <div class="msg-search-action-header-bar">
                <div class="msg-search-input-frame">
                    <input type="text" id="msg-threads-search-field" placeholder="Search for chat" oninput="executeMessagesFilterEngine()">
                    <svg class="lens-svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </div>
                <button class="msg-sort-dropdown-trigger" id="msg-sort-popover-launcher" onclick="toggleMsgSortPopoverMenu(event)">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><circle cx="4" cy="12" r="2"/><circle cx="12" cy="10" r="2"/><circle cx="20" cy="14" r="2"/></svg>
                </button>
                   
                <div class="sort-options-popover-menu" id="msg-sort-menu-box">
                    <button onclick="applyMessageSortingStrategy('name')">Sort by Name</button>
                    <button onclick="applyMessageSortingStrategy('newest')">Newest Date</button>
                    <button onclick="applyMessageSortingStrategy('oldest')">Oldest Date</button>
                </div>
            </div>

            <div class="capsule-pill-navigation-container">
                <button class="tab-nav-link active-link-node" id="msg-tab-all" onclick="switchMessagesTabContext('all')">All</button>
                <button class="tab-nav-link" id="msg-tab-unread" onclick="switchMessagesTabContext('unread')">Unread</button>
                <button class="tab-nav-link" id="msg-tab-spam" onclick="switchMessagesTabContext('spam')">Spam</button>
                <button class="tab-nav-link" id="msg-tab-client" onclick="switchMessagesTabContext('client')">Clients</button>
            </div>
        </div>

        <div class="empty-inbox-placeholder-box" id="msg-empty-inbox-state">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#8e8e93" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>No conversations found</p>
        </div>

        <div class="msg-threads-scroll-track" id="msg-threads-render-feed"></div>
    </section>

    <div class="chat-interface-layout" id="runtime-chat-overlay-window" style="display: none;">
        <header class="chat-window-top-navigation-bar">
            <span class="chat-window-back-btn" onclick="closeActiveChatThreadOverlay()">←</span>
            <img class="chat-header-profile-avatar" id="chat-window-header-avatar" src="" alt="">
            <div class="chat-header-meta-column">
                <span class="chat-header-interlocutor-name" id="chat-window-header-title"></span>
                <span class="chat-header-status-presence" id="chat-window-header-status">Online</span>
            </div>
        </header>
        
        <div class="chat-bubbles-timeline-scroll-stream" id="chat-bubbles-render-stream"></div>
        
        <footer class="chat-input-controls-dock-footer">
            <button class="chat-media-attachment-action-trigger" onclick="triggerNativeFileSelectionField()">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input type="file" id="chat-hidden-native-file-input" style="display: none;" accept="image/*,.pdf,.doc,.docx,.txt" onchange="handleNativeFileUploadedEvent(this)">
            
            <div class="chat-input-textarea-element-wrapper">
                <input type="text" id="chat-window-text-input-field" placeholder="Type a message..." onkeydown="handleChatInputKeyDownSubmit(event)">
                <div class="audio-recording-active-track-overlay" id="audio-recording-ui-overlay">
                    <span>🎙️ Live Hardware Recording...</span>
                    <span id="audio-recording-timer-label">0:00</span>
                </div>
            </div>
            <button class="chat-voice-note-recorder-action-trigger" id="chat-voice-recorder-btn" onclick="toggleAudioVoiceRecorderAction()">
                <i class="ph ph-microphone" style="font-size: 22px;"></i>
            </button>
            <button class="chat-message-dispatch-send-btn" onclick="executeManualChatThreadDispatchedPayload()">
                <i class="ph ph-paper-plane-right" style="font-size: 18px;"></i>
            </button>
        </footer>
    </div>

    <!-- BOTTOM PINNED GLOBAL TAB MENU LAYOUT -->
    <nav class="bottom-nav">
        <div id="bottom-nav-home" class="nav-item tab-trigger" data-route="home" onclick="window.location.href='home.html'">
            <i class="ph ph-house"></i> <span>Home</span>
        </div>
        <div class="nav-item tab-trigger" data-route="messages" onclick="window.location.href='message.html'">
            <i class="ph ph-chats-circle"></i> <span>Messages</span>
        </div>
        <div class="nav-item tab-trigger" data-route="add" onclick="window.location.href='add.html'">
            <i class="ph ph-plus-circle"></i> <span>Add</span>
        </div>
        <div class="nav-item tab-trigger" data-route="saved" onclick="window.location.href='saved.html'">
            <i class="ph ph-bookmark-simple"></i> <span>Saved</span>
        </div>
        <div class="nav-item tab-trigger" data-route="settings" onclick="window.location.href='settings.html'">
            <i class="ph ph-gear"></i> <span>Settings</span>
        </div>
    </nav>
</div>

<script>
    // Theme Engine Activation Implementation Hook
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark-theme');
    }

    // Global Active Navigation Configuration Trackers
    function setActiveNav() {
        const currentPath = window.location.pathname;
        document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
            item.classList.remove('active');
        });
        
        const activeItem = document.querySelector('.bottom-nav .nav-item[data-route="messages"]');
        if(activeItem) {
            activeItem.classList.add('active');
        }
    }

    // Add click handlers for navigation
    document.querySelectorAll('.bottom-nav .nav-item').forEach(tab => {
        tab.addEventListener('click', function() {
            const destinationRoute = this.getAttribute('data-route');
            const routeMap = {
                'home': 'home.html',
                'messages': 'message.html',
                'add': 'add.html',
                'saved': 'saved.html',
                'settings': 'settings.html'
            };
            const targetPage = routeMap[destinationRoute];
            if(targetPage) {
                window.location.href = targetPage;
            }
        });
    });

    window.addEventListener('load', setActiveNav);

    // Isolated Messaging Core State Framework (Refined for Spam Integration)
    let CHAT_CHANNELS_DATABASE = [
        {
            id: "chat_001",
            partnerName: "David Agbnu",
            avatar: "https://images.unsplash.com/photo-1540569014015-19a7be504e3a?auto=format&fit=crop&w=100&q=80",
            unreadCount: 6,
            isClient: false,
            isSpam: false,
            timestamp: "05:13 PM",
            dateObject: new Date(2026, 5, 7, 17, 13),
            messages: [
                { msgId: "m1", sender: "them", text: "Hello dear, please reply me", time: "05:13 PM", read: false }
            ]
        },
        {
            id: "chat_002",
            partnerName: "Ekoe Chris",
            avatar: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=100&q=80",
            unreadCount: 1,
            isClient: false,
            isSpam: false,
            timestamp: "03:01 PM",
            dateObject: new Date(2026, 5, 7, 15, 1),
            messages: [
                { msgId: "m2", sender: "them", text: "This is not a dating site so don't...", time: "03:01 PM", read: false }
            ]
        },
        {
            id: "chat_003",
            partnerName: "Yaw Adoley Mary",
            avatar: "https://images.unsplash.com/photo-1595981267035-7b04ec84a82d?auto=format&fit=crop&w=100&q=80",
            unreadCount: 1,
            isClient: false,
            isSpam: false,
            timestamp: "02:40 PM",
            dateObject: new Date(2026, 5, 7, 14, 40),
            messages: [
                { msgId: "m3", sender: "them", text: "You didn't meet the requirement...", time: "02:40 PM", read: false }
            ]
        },
        {
            id: "chat_004",
            partnerName: "Efia Kumi",
            avatar: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=100&q=80",
            unreadCount: 0,
            isClient: true,
            isSpam: false,
            timestamp: "03/03/26",
            dateObject: new Date(2026, 2, 3),
            messages: [
                { msgId: "m4", sender: "you", text: "Okay 👍", time: "11:20 AM", read: true }
            ]
        },
        {
            id: "chat_005",
            partnerName: "Cryptocurrency Elite Team",
            avatar: "https://images.unsplash.com/photo-1621761191319-c6fb62004040?auto=format&fit=crop&w=100&q=80",
            unreadCount: 3,
            isClient: false,
            isSpam: true,
            timestamp: "Yesterday",
            dateObject: new Date(2026, 5, 6),
            messages: [
                { msgId: "m5", sender: "them", text: "Earn 50000 USD daily working from home guaranteed schemes info link details inside!", time: "10:15 AM", read: false }
            ]
        }
    ];

    let activeSelectedChannelId = null;
    let currentMessagesTab = 'all';
    let currentMessagesSortStrategy = 'newest';

    // Hardware Interface Media Capturing Controllers
    let hardwareMediaRecorderInstance = null;
    let hardwareAudioPlaybackChunks = [];
    let recordDurationIntervalId = null;
    let elapsedRecordingDurationSeconds = 0;

    /* ==========================================================================
       --- INTERACTIVE JAVASCRIPT MESSAGES PROCESSING ENGINE ---
       ========================================================================== */
    function toggleMsgSortPopoverMenu(event) {
        event.stopPropagation();
        document.getElementById('msg-sort-menu-box').classList.toggle('open');
    }

    function applyMessageSortingStrategy(strategy) {
        currentMessagesSortStrategy = strategy;
        executeMessagesFilterEngine();
    }

    function switchMessagesTabContext(tabName) {
        currentMessagesTab = tabName;
        document.querySelectorAll('.capsule-pill-navigation-container .tab-nav-link').forEach(btn => {
            btn.classList.remove('active-link-node');
        });
        document.getElementById(`msg-tab-${tabName}`).classList.add('active-link-node');
        executeMessagesFilterEngine();
    }

    function evaluateGlobalBottomNavbarUnreadStateBadge() {
        const hasUnread = CHAT_CHANNELS_DATABASE.some(c => c.unreadCount > 0);
        const dot = document.getElementById('global-messages-unread-indicator-dot');
        if(dot) dot.style.display = hasUnread ? 'block' : 'none';
    }

    function executeMessagesFilterEngine() {
        let tracks = [...CHAT_CHANNELS_DATABASE];

        // Explicit Segment Routing Configurations
        if(currentMessagesTab === 'unread') {
            tracks = tracks.filter(t => t.unreadCount > 0 && !t.isSpam);
        } else if(currentMessagesTab === 'client') {
            tracks = tracks.filter(t => t.isClient === true && !t.isSpam);
        } else if(currentMessagesTab === 'spam') {
            tracks = tracks.filter(t => t.isSpam === true);
        } else {
            // 'all' Tab Context excludes direct Spam channels matching picture layouts
            tracks = tracks.filter(t => !t.isSpam);
        }

        const searchInput = document.getElementById('msg-threads-search-field').value.trim().toLowerCase();
        if(searchInput) {
            tracks = tracks.filter(t => t.partnerName.toLowerCase().includes(searchInput));
        }

        if(currentMessagesSortStrategy === 'name') {
            tracks.sort((a, b) => a.partnerName.localeCompare(b.partnerName));
        } else if(currentMessagesSortStrategy === 'newest') {
            tracks.sort((a, b) => b.dateObject - a.dateObject);
        } else if(currentMessagesSortStrategy === 'oldest') {
            tracks.sort((a, b) => a.dateObject - b.dateObject);
        }

        const feedContainer = document.getElementById('msg-threads-render-feed');
        const placeholder = document.getElementById('msg-empty-inbox-state');

        if(tracks.length === 0) {
            feedContainer.innerHTML = '';
            placeholder.style.display = 'flex';
            return;
        }
        placeholder.style.display = 'none';

        feedContainer.innerHTML = tracks.map(channel => {
            const lastMsgObj = channel.messages[channel.messages.length - 1];
            let lastMsgPreview = lastMsgObj ? lastMsgObj.text : "No messages yet";
            if (lastMsgObj && lastMsgObj.isDeleted) lastMsgPreview = "message deleted";

            return `
                <div class="chat-thread-channel-cell ${channel.unreadCount > 0 ? 'unread-thread-state' : ''}" onclick="launchActiveChatOverlay('${channel.id}')">
                    <div class="thread-avatar-wrapper">
                        <img src="${channel.avatar}" alt="${channel.partnerName}">
                    </div>
                    <div class="thread-meta-details-column">
                        <div class="thread-upper-row">
                            <span class="thread-profile-title">${channel.partnerName}</span>
                            <span class="thread-timestamp-label">${channel.timestamp}</span>
                        </div>
                        <div class="thread-lower-row">
                            <p class="thread-message-snippet">${lastMsgPreview}</p>
                            ${channel.unreadCount > 0 ? `<span class="thread-unread-numeric-alert-pill">${channel.unreadCount}</span>` : `
                                <svg class="cell-delivery-status-ticks-svg" viewBox="0 0 24 24"><path d="M2 12l5 5L22 4M6 12l5 5L18 9"/></svg>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Dynamic Deep-Link Redirection Processing Systems
    function interceptActiveInboundDeepLinkingChannelRouter() {
        const queryParams = new URLSearchParams(window.location.search);
        const externalTargetInterlocutorName = queryParams.get('name');
        const externalTargetAvatarUrl = queryParams.get('avatar');

        if(externalTargetInterlocutorName) {
            let matchingChannel = CHAT_CHANNELS_DATABASE.find(c => c.partnerName === externalTargetInterlocutorName);
            if(!matchingChannel) {
                matchingChannel = {
                    id: "chat_runtime_" + Date.now(),
                    partnerName: externalTargetInterlocutorName,
                    avatar: externalTargetAvatarUrl || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80",
                    unreadCount: 0,
                    isClient: false,
                    isSpam: false,
                    timestamp: "Just Now",
                    dateObject: new Date(),
                    messages: []
                };
                CHAT_CHANNELS_DATABASE.unshift(matchingChannel);
            }
            launchActiveChatOverlay(matchingChannel.id);
        }
    }

    function launchActiveChatOverlay(channelId) {
        activeSelectedChannelId = channelId;
        const channel = CHAT_CHANNELS_DATABASE.find(c => c.id === channelId);
        if(!channel) return;

        // Instantly neutralize counters on open
        channel.unreadCount = 0;
        evaluateGlobalBottomNavbarUnreadStateBadge();
        executeMessagesFilterEngine();

        document.getElementById('chat-window-header-title').innerText = channel.partnerName;
        document.getElementById('chat-window-header-avatar').src = channel.avatar;
        
        renderChatTimelineStreamPayload(channel);
        document.getElementById('runtime-chat-overlay-window').style.display = 'flex';
    }

    function closeActiveChatThreadOverlay() {
        document.getElementById('runtime-chat-overlay-window').style.display = 'none';
        activeSelectedChannelId = null;
        executeMessagesFilterEngine();
    }

    function renderChatTimelineStreamPayload(channel) {
        const container = document.getElementById('chat-bubbles-render-stream');
        if(!container) return;

        if (channel.messages.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:12px; margin-top:40px;">No messages here. Start the conversation...</p>`;
            return;
        }

        container.innerHTML = channel.messages.map(msg => {
            const isOutgoing = msg.sender === 'you';
            
            if (msg.isDeleted) {
                return `
                    <div class="chat-message-row-node ${isOutgoing ? 'outgoing-node-direction' : 'incoming-node-direction'}">
                        <div class="speech-bubble-payload speech-bubble-deleted-fallback">
                            <span>message deleted</span>
                        </div>
                    </div>
                `;
            }

            let mediaContentPayloadText = `<span>${msg.text}</span>`;

            // Render real dynamic audio nodes if source path references object entries
            if (msg.audioUrl) {
                mediaContentPayloadText = `
                    <audio src="${msg.audioUrl}" controls style="max-width:100%; margin-bottom:4px;"></audio>
                    <button class="voice-msg-trash-delete-btn" onclick="destroySelectedMessagePayload('${msg.msgId}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete Note
                    </button>
                `;
            }

            return `
                <div class="chat-message-row-node ${isOutgoing ? 'outgoing-node-direction' : 'incoming-node-direction'}">
                    <div class="speech-bubble-payload">
                        ${mediaContentPayloadText}
                        <div class="speech-bubble-meta-footer">
                            <span class="speech-bubble-timestamp">${msg.time}</span>
                            ${isOutgoing ? `<svg class="speech-delivery-status-check-svg" style="color:#26d07c;" viewBox="0 0 24 24"><path d="M2 12l5 5L22 4M6 12l5 5L18 9"/></svg>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        container.scrollTop = container.scrollHeight;
    }

    function executeManualChatThreadDispatchedPayload() {
        const inputComponent = document.getElementById('chat-window-text-input-field');
        const textPayload = inputComponent.value.trim();
        if(!textPayload || !activeSelectedChannelId) return;

        const channel = CHAT_CHANNELS_DATABASE.find(c => c.id === activeSelectedChannelId);
        if(!channel) return;

        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        channel.messages.push({
            msgId: "m_" + Date.now(),
            sender: "you",
            text: textPayload,
            time: timeStr
        });

        inputComponent.value = '';
        renderChatTimelineStreamPayload(channel);
    }

    function handleChatInputKeyDownSubmit(event) {
        if(event.key === 'Enter') {
            executeManualChatThreadDispatchedPayload();
        }
    }

    function triggerNativeFileSelectionField() {
        document.getElementById('chat-hidden-native-file-input').click();
    }

    function handleNativeFileUploadedEvent(inputComponent) {
        const chosenFile = inputComponent.files[0];
        const channel = CHAT_CHANNELS_DATABASE.find(c => c.id === activeSelectedChannelId);
        if(!channel || !chosenFile) return;

        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        channel.messages.push({
            msgId: "m_file_" + Date.now(),
            sender: "you",
            text: `📄 ${chosenFile.name} (${(chosenFile.size/1024).toFixed(1)} KB)`,
            time: timeStr
        });

        renderChatTimelineStreamPayload(channel);
        inputComponent.value = '';
    }

    // Live Action Hardware Mic Audio Capturing Systems Architecture
    function toggleAudioVoiceRecorderAction() {
        const btn = document.getElementById('chat-voice-recorder-btn');
        const uiTrackOverlay = document.getElementById('audio-recording-ui-overlay');

        if (!hardwareMediaRecorderInstance || hardwareMediaRecorderInstance.state === "inactive") {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    hardwareAudioPlaybackChunks = [];
                    hardwareMediaRecorderInstance = new MediaRecorder(stream);
                    
                    hardwareMediaRecorderInstance.ondataavailable = e => {
                        if (e.data.size > 0) hardwareAudioPlaybackChunks.push(e.data);
                    };

                    hardwareMediaRecorderInstance.onstop = () => {
                        const audioBlob = new Blob(hardwareAudioPlaybackChunks, { type: 'audio/mp3' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        const channel = CHAT_CHANNELS_DATABASE.find(c => c.id === activeSelectedChannelId);
                        
                        if (channel && elapsedRecordingDurationSeconds > 0) {
                            const now = new Date();
                            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            
                            channel.messages.push({
                                msgId: "m_audio_" + Date.now(),
                                sender: "you",
                                text: "Voice Note",
                                audioUrl: audioUrl,
                                time: timeStr
                            });
                            renderChatTimelineStreamPayload(channel);
                        }
                    };

                    hardwareMediaRecorderInstance.start();
                    btn.classList.add('recording-active');
                    uiTrackOverlay.style.display = 'flex';
                    
                    elapsedRecordingDurationSeconds = 0;
                    document.getElementById('audio-recording-timer-label').innerText = "0:00";
                    
                    recordDurationIntervalId = setInterval(() => {
                        elapsedRecordingDurationSeconds++;
                        const mins = Math.floor(elapsedRecordingDurationSeconds / 60);
                        const secs = elapsedRecordingDurationSeconds % 60;
                        document.getElementById('audio-recording-timer-label').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                    }, 1000);
                }).catch(err => {
                    alert("Audio device collection stream hardware context failed initialization node mapping.");
                });
        } else {
            hardwareMediaRecorderInstance.stop();
            clearInterval(recordDurationIntervalId);
            btn.classList.remove('recording-active');
            uiTrackOverlay.style.display = 'none';
        }
    }

    function destroySelectedMessagePayload(msgId) {
        const channel = CHAT_CHANNELS_DATABASE.find(c => c.id === activeSelectedChannelId);
        if(!channel) return;
        
        const targetMessage = channel.messages.find(m => m.msgId === msgId);
        if(targetMessage) {
            targetMessage.isDeleted = true;
            renderChatTimelineStreamPayload(channel);
        }
    }

    document.addEventListener('click', () => {
        document.getElementById('msg-sort-menu-box').classList.remove('open');
    });

    // Boot execution systems configuration context
    window.addEventListener('DOMContentLoaded', () => {
        executeMessagesFilterEngine();
        evaluateGlobalBottomNavbarUnreadStateBadge();
        interceptActiveInboundDeepLinkingChannelRouter();
    });
</script>
