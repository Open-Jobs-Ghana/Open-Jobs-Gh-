<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="api.js"></script>
    <title>Open Jobs Ghana | Settings</title>
    <style>
        :root {
            --purple-main: #500E8C;
            --bg-body: #F9FAFB;
            --bg-card: #ffffff;
            --text-dark: #500E8C;
            --text-muted: #6B7280;
            --border-color: #F3F4F6;
            --hover-color: #FBF9FE;
            --bottom-nav-border: #E5E7EB;
        }

        /* Premium Dark Theme Variable Overrides */
        .dark-theme {
            --purple-main: #a362e6;
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-dark: #f5f5f5;
            --text-muted: #a0a0a5;
            --border-color: #2d2d30;
            --hover-color: #2a2a2d;
            --bottom-nav-border: #2d2d30;
        }

        * { 
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            align-items: flex-start;
            justify-content: center;
            color: var(--text-dark);
        }

        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        /* Top Header Component */
        .header-nav {
            padding: 30px 24px 15px;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Core Responsive Layout Spreading */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            width: 100%;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 160px; /* Leaves clean breathing room above bottom menu */
        }

        /* ==========================================
           SETTINGS VIEW STYLING (Far Left & Fluid)
        ========================================== */
        .settings-list-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px; /* Restricts maximum stretch safely on big displays */
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 8px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.15s ease;
            background: var(--bg-card);
        }

        .settings-item:not(:last-child) {
            border-bottom: 1px solid var(--border-color);
        }

        .settings-item:hover {
            background-color: var(--hover-color);
        }

        .settings-item-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .settings-icon-box {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }

        .settings-label-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .settings-item.profile-item 
        .settings-label-text {
            font-size: 18px;
            font-weight: 700;
        }

        .settings-chevron {
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            visibility: visible;
        }

        .settings-chevron i {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-dark);
            display: block  !important;
            visibility: visible !important;
            line-height: 1;
        }

        .settings-icon-box i {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Toggle Switch UI Styling */
        .theme-toggle-switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .theme-toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #500E8C;
        }

        .dark-theme input:checked + .toggle-slider {
            background-color: var(--purple-main);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }

        /* ==========================================
           BOTTOM PINNED GLOBAL TAB MENU LAYOUT
        ========================================== */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: var(--bg-card);
            border-top: 1px solid var(--bottom-nav-border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 10;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02);
            padding: 0 40px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            width: 100px;
            padding: 8px 0;
        }

        .nav-item.active { color: var(--purple-main); font-weight: 600;
        }
        
        .bottom-nav .nav-item i {
            font-size: 26px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }

        .bottom-nav .nav-item.active i {
            font-size: 32px;
            color: var(--purple-main);
        }
            
        .bottom-nav .nav-item span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .bottom-nav .nav-item.active span {
            color: var(--purple-main);
        }

        /* Mobile Breakdowns */
        @media (max-width: 768px) {
            .main-content { 
                padding: 16px;
                padding-bottom: 100px; /* Gives extra space at the bottom on mobile screen contexts */
            }
            .settings-list-container { max-width: 100%; border-radius: 12px;
            }
            .settings-item { padding: 16px;
            }
            .bottom-nav { padding: 0; height: 72px;
            }
            .nav-item { font-size: 11px; width: auto;
            }
        }
    </style>
</head>
<body>

<!-- Dynamic Document Theme Bootstrap Node Handler Injection -->
<script>
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark-theme');
    }
</script>

<div id="app-container">

    <!-- Top Header Navigation Header Component -->
    <div class="header-nav">
        <div class="header-title">Settings</div>
    </div>

    <!-- Responsive content container wrapper -->
    <div class="main-content">
        <div class="settings-list-container">
            
            <!-- 1. User Profile Row -->
            <div class="settings-item profile-item" data-setting="profile">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-user-circle-gear" style="font-size: 28px;"></i>
                    </div>
                   <div class="settings-label-text" id="settings-name">Loading...</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 2. My Ads Link Row -->
            <div class="settings-item" data-setting="my-ads">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                       <i class="ph ph-squares-four" style="font-size: 26px;"></i>
                    </div>
                    <div class="settings-label-text">My Ads</div>
                </div>
                <div class="settings-chevron">
                      <i class="ph ph-caret-right" style="font-size: 24px;"></i>
                </div>
            </div>

            <!-- 3. Email Configurations Row -->
            <div class="settings-item" data-setting="email">
                 <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-envelope-simple"></i>
                    </div>
                    <div class="settings-label-text">Email</div>
              </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 4. Telephone Row -->
            <div class="settings-item" data-setting="telephone">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-phone"></i>
                   </div>
                    <div class="settings-label-text">Telephone</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                 </div>
            </div>

            <!-- 5. Verification Status Row -->
            <div class="settings-item" data-setting="verification">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-seal-check"></i>
                    </div>
                    <div class="settings-label-text">Verification Status</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 6. Money and Payments Gateway Row -->
            <div class="settings-item" data-setting="payments">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-wallet"></i>
                    </div>
                    <div class="settings-label-text">Money and Payments</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 7. Password Controls Row -->
            <div class="settings-item" data-setting="password">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-lock"></i>
                    </div>
                    <div class="settings-label-text">Password</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
             </div>
            </div>

            <!-- 8. Language Selection Row -->
            <div class="settings-item" data-setting="language">
                <div class="settings-item-left">
                 <div class="settings-icon-box">
                        <i class="ph ph-globe"></i>
                    </div>
                    <div class="settings-label-text">Language</div>
                </div>
                 <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 9. Notifications Toggle Switch (was a separate page, now inline) -->
            <div class="settings-item" data-setting="notifications-toggle-row">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-bell"></i>
                    </div>
                    <div class="settings-label-text">Notifications</div>
                </div>
                <label class="theme-toggle-switch" onclick="event.stopPropagation()">
                    <input type="checkbox" id="notifications-toggle-checkbox" onchange="executeNotificationsToggleChange()">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- 10. Dark Theme Configuration Row Toggle Switch -->
            <div class="settings-item" data-setting="theme-toggle-row">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-moon"></i>
              </div>
                    <div class="settings-label-text">Dark Theme</div>
                </div>
                <label class="theme-toggle-switch" onclick="event.stopPropagation()">
                    <input type="checkbox" id="theme-toggle-checkbox" onchange="executeThemeToggleEventChange()">
                     <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- 10b. Biometric Sign-In Toggle Row (Face ID / Fingerprint / Windows Hello) -->
            <div class="settings-item" id="biometric-row" data-setting="biometric-toggle-row" style="display: none;">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-fingerprint"></i>
                    </div>
                    <div class="settings-label-text">Biometric Sign-In</div>
                </div>
                <label class="theme-toggle-switch" onclick="event.stopPropagation()">
                    <input type="checkbox" id="biometric-toggle-checkbox" onchange="executeBiometricToggleChange()">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <!-- 11. Irreversible Delete Account Action Row -->
            <div class="settings-item" data-setting="delete-account">
               <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-trash"></i>
                    </div>
                    <div class="settings-label-text">Delete Account</div>
             </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 12. Support Center Row -->
            <div class="settings-item" data-setting="help-support">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-headphones"></i>
            </div>
                    <div class="settings-label-text">Support Center</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
      </div>
            </div>

            <!-- 13. About Specifications Row Info -->
            <div class="settings-item" data-setting="about">
                <div class="settings-item-left">
                   <div class="settings-icon-box">
                        <i class="ph ph-info"></i>
                    </div>
                    <div class="settings-label-text">About</div>
                </div>
                   <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 14. Logout Action -->
            <div class="settings-item" data-setting="logout">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-sign-out"></i>
                    </div>
                    <div class="settings-label-text">Logout</div>
             </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

        </div>
    </div>

    <!-- ==========================================
       BOTTOM PINNED GLOBAL TAB MENU LAYOUT
    ========================================== -->
    <div class="bottom-nav">
        <div class="nav-item tab-trigger" data-route="home" onclick="window.location.href='home.html'">
            <i class="ph ph-house"></i>
            <span>Home</span>
        </div>

        <div class="nav-item tab-trigger" data-route="messages" onclick="window.location.href='message.html'">
            <i class="ph ph-chats-circle"></i>
            <span>Messages</span>
         </div>

        <div class="nav-item tab-trigger" data-route="add" onclick="window.location.href='add.html'">
            <i class="ph ph-plus-circle"></i>
            <span>Add</span>
        </div>

        <div class="nav-item tab-trigger" data-route="saved" onclick="window.location.href='saved.html'">
            <i class="ph ph-bookmark-simple"></i>
            <span>Saved</span>
        </div>

         <div class="nav-item tab-trigger" data-route="settings" onclick="window.location.href='settings.html'">
            <i class="ph ph-gear"></i>
            <span>Settings</span>
        </div>

    </div>

</div>

<script>
    function setActiveNav() {
        const currentPage = window.location.pathname.split('/').pop() || 'settings.html';
        const navItems = document.querySelectorAll('.nav-item[data-route]');
        navItems.forEach(item => item.classList.remove('active'));
        
        const routeMap = {
            'add.html': 'add',
            'saved.html': 'saved',
            'home.html': 'home',
            'message.html': 'messages',
            'settings.html': 'settings'
        };
        const currentRoute = routeMap[currentPage];
        if(currentRoute) {
            const activeItem = document.querySelector(`.nav-item[data-route="${currentRoute}"]`);
            if(activeItem) activeItem.classList.add('active');
        }
    }
    
    window.addEventListener('load', setActiveNav);

    function syncCheckboxWithActiveThemeState() {
        const checkbox = document.getElementById('theme-toggle-checkbox');
        if (document.documentElement.classList.contains('dark-theme')) {
            checkbox.checked = true;
        } else {
            checkbox.checked = false;
        }
    }

    function executeThemeToggleEventChange() {
        const checkbox = document.getElementById('theme-toggle-checkbox');
        if (checkbox.checked) {
            document.documentElement.classList.add('dark-theme');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.classList.remove('dark-theme');
            localStorage.setItem('theme', 'light');
        }
    }

    /* ==========================================
       SETTINGS LIST SUB-ROW INTERACTION HANDLERS 
    ========================================== */
    document.querySelectorAll('.settings-item').forEach(item => {
        item.addEventListener('click', async function() {
            const settingId = this.getAttribute('data-setting');
            
            switch(settingId) {
                case 'profile':
                    window.location.href = 'account.html';
                    break;
                case 'my-ads':
                    window.location.href = 'ads.html';
                    break;
                case 'email':
                    window.location.href = 'account.html';
                    break;
                case 'telephone':
                    window.location.href = 'account.html';
                    break;
                case 'verification':
                    await OpenAPI.showAlert("Verification isn't available yet — check back soon!", { title: "Coming soon" });
                    break;
                case 'payments':
                    window.location.href = 'money-and-payment.html';
                    break;
                case 'password':
                    window.location.href = 'account.html';
                    break;
                case 'language':
                    window.location.href = 'language.html';
                    break;
                case 'notifications-toggle-row':
                    const notifCheckbox = document.getElementById('notifications-toggle-checkbox');
                    notifCheckbox.checked = !notifCheckbox.checked;
                    executeNotificationsToggleChange();
                    break;
                case 'theme-toggle-row':
                    const checkbox = document.getElementById('theme-toggle-checkbox');
                    checkbox.checked = !checkbox.checked;
                    executeThemeToggleEventChange();
                    break;
                case 'biometric-toggle-row':
                    const bioCheckbox = document.getElementById('biometric-toggle-checkbox');
                    bioCheckbox.checked = !bioCheckbox.checked;
                    executeBiometricToggleChange();
                    break;
                case 'delete-account':
                    window.location.href = 'delete-account.html';
                    break;
                case 'help-support':
                    window.location.href = 'support-center.html';
                    break;
                case 'about':
                    window.location.href = 'about.html';
                    break;
                case 'logout':
                    // Route through logout.html so the user gets a
                    // confirmation step AND the session actually gets
                    // cleared (via OpenAPI.clearSession) before login.html.
                    window.location.href = 'logout.html';
                    break;
                default:
                    break;
            }
        });
    });

    document.addEventListener('DOMContentLoaded', () => {
        syncCheckboxWithActiveThemeState();
        document.getElementById('notifications-toggle-checkbox').checked = OpenAPI.getNotificationsEnabled();

        const session = OpenAPI.getSession();

        if (session) {
            const currentUser = OpenAPI.getUserByEmail(session.email);
            if (currentUser) {
                const nameDisplay = document.getElementById('settings-name');
                if (nameDisplay) {
                    nameDisplay.innerText = currentUser.name;
                }
            }

            // Only show the biometric row if this device can actually do it.
            OpenAPI.isBiometricAvailableOnDevice().then(available => {
                if (!available) return;
                document.getElementById('biometric-row').style.display = 'flex';
                document.getElementById('biometric-toggle-checkbox').checked =
                    OpenAPI.hasBiometricEnabled(session.email);
            });
        }
    });

    function executeNotificationsToggleChange() {
        const checkbox = document.getElementById('notifications-toggle-checkbox');
        OpenAPI.setNotificationsEnabled(checkbox.checked);
    }

    async function executeBiometricToggleChange() {
        const session = OpenAPI.getSession();
        const checkbox = document.getElementById('biometric-toggle-checkbox');
        if (!session) return;

        if (checkbox.checked) {
            checkbox.disabled = true;
            const result = await OpenAPI.registerBiometric(session.email);
            checkbox.disabled = false;
            if (!result.ok) {
                checkbox.checked = false;
                await OpenAPI.showAlert("Couldn't set up biometric sign-in on this device. Please try again.", { title: "Biometric sign-in" });
            }
        } else {
            OpenAPI.disableBiometric(session.email);
        }
    }
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Small purple unread-count badge on the Messages nav icon, visible
    // from any page with a bottom nav — not just after opening Messages.
    OpenAPI.refreshMessagesNavBadge();
});
</script>
</body>
</html>
