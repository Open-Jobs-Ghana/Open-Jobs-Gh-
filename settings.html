<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>Open Jobs Ghana | Settings</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            width: 100%; 
            height: 100dvh;
            background-color: #F9FAFB;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            align-items: flex-start;
            justify-content: center;
        }

        #app-container {
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column;
            background: #ffffff;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        /* Top Header Component */
        .header-nav {
            padding: 30px 24px 15px;
            display: flex; 
            align-items: center;
            background: #FFF; 
            border-bottom: 1px solid #F3F4F6;
            z-index: 10;
        }

        .header-title {
            font-size: 20px; 
            font-weight: 700; 
            color: #500E8C;
        }

        /* Core Responsive Layout Spreading */
        .main-content {
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 0;
            width: 100%; 
            -webkit-overflow-scrolling: touch;
            padding-bottom: 160px; /* Leaves clean breathing room above bottom menu */
        }

        /* ==========================================
           SETTINGS VIEW STYLING (Far Left & Fluid)
        ========================================== */
        .settings-list-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px; /* Restricts maximum stretch safely on big displays */
            margin: 0 auto; /* Forces alignment to the far left */
            background: #FFF;
            border-radius: 20px;
            padding: 8px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid #F3F4F6;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.15s ease;
            background: #FFF;
        }

        .settings-item:not(:last-child) {
            border-bottom: 1px solid #F3F4F6;
        }

        .settings-item:hover {
            background-color: #FBF9FE;
        }

        .settings-item-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .settings-icon-box {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #500E8C;
        }

        

        .settings-label-text {
            font-size: 16px;
            font-weight: 600;
            color: #500E8C;
        }

        .settings-item.profile-item 
        .settings-label-text {
            font-size: 18px;
            font-weight: 700;
        }

        .settings-chevron {
            color: #500E8C;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            visibility: visible;
        }

        .settings-chevron i {
            font-size: 20px;
            font-weight: bold;
            color: #500E8C;
            display: block  !important;
            visibility: visible !important;
            line-height: 1;
        }


        .settings-icon-box i {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==========================================
           BOTTOM PINNED GLOBAL TAB MENU LAYOUT
        ========================================== */
        .bottom-nav {
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 80px;
            background: #FFF; 
            border-top: 1px solid #E5E7EB; 
            display: flex;
            align-items: center; 
            justify-content: space-around; 
            z-index: 10;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.02); 
            padding: 0 40px;
        }

        .nav-item {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            color: #6B7280; 
            font-size: 13px; 
            font-weight: 500; 
            text-decoration: none; 
            cursor: pointer;
            width: 100px; 
            padding: 8px 0;
        }

        .nav-item.active { color: #500E8C; font-weight: 600; }
        
        .bottom-nav .nav-item i {
            font-size: 26px;
            color: #6B7280;
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }

        .bottom-nav .nav-item.active i {
            font-size: 32px;
            color: #500E8C;
        }
            
        .bottom-nav .nav-item span {
            font-size: 11px;
            font-weight: 600;
            color: #6B7280;
            transition: color 0.3s ease;
        }

        .bottom-nav .nav-item.active span {
            color: #500E8C;
        }

        /* Mobile Breakdowns */
        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .settings-list-container { max-width: 100%; border-radius: 12px; }
            .settings-item { padding: 16px; }
            .bottom-nav { padding: 0; height: 72px; }
            .nav-item { font-size: 11px; width: auto; }
        }
    </style>
</head>
<body>

<div id="app-container">

    <!-- Top Header Navigation Header Component -->
    <div class="header-nav">
        <div class="header-title">Settings</div>
    </div>

    <!-- Responsive content container wrapper -->
    <div class="main-content">
        <div class="settings-list-container">
            
            <!-- 1. User Profile Row -->
            <!-- LINK SLOT: SLOT_PROFILE_PAGE -->
            <div class="settings-item profile-item" data-setting="profile">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-user-circle-gear" style="font-size: 28px;"></i>
                    </div>
                    <div class="settings-label-text" id="settings-name">Juliana Ekpetogi</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 2. My Ads Link Row -->
            <!-- LINK SLOT: SLOT_MY_ADS_PAGE -->
            <div class="settings-item" data-setting="my-ads">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-squares-four" style="font-size: 26px;"></i>
                    </div>
                    <div class="settings-label-text">My Ads</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right" style="font-size: 24px;"></i>
                </div>
            </div>

            <!-- 3. Email Configurations Row -->
            <!-- LINK SLOT: SLOT_EMAIL_CONFIG_PAGE -->
            <div class="settings-item" data-setting="email">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-envelope-simple"></i>
                    </div>
                    <div class="settings-label-text">Email</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 4. Telephone Row -->
            <!-- LINK SLOT: SLOT_TELEPHONE_PAGE -->
            <div class="settings-item" data-setting="telephone">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-phone"></i>
                    </div>
                    <div class="settings-label-text">Telephone</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 5. Verification Status Row -->
            <!-- LINK SLOT: SLOT_VERIFICATION_STATUS_PAGE -->
            <div class="settings-item" data-setting="verification">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-seal-check"></i>
                    </div>
                    <div class="settings-label-text">Verification Status</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 6. Money and Payments Gateway Row -->
            <!-- LINK SLOT: SLOT_MONEY_PAYMENTS_PAGE -->
            <div class="settings-item" data-setting="payments">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-wallet"></i>
                    </div>
                    <div class="settings-label-text">Money and Payments</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 7. Password Controls Row -->
            <!-- LINK SLOT: SLOT_PASSWORD_PAGE -->
            <div class="settings-item" data-setting="password">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-lock"></i>
                    </div>
                    <div class="settings-label-text">Password</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 8. Language Selection Row -->
            <!-- LINK SLOT: SLOT_LANGUAGE_PAGE -->
            <div class="settings-item" data-setting="language">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-globe"></i>
                    </div>
                    <div class="settings-label-text">Language</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 9. Notifications Settings System Row -->
            <!-- LINK SLOT: SLOT_NOTIFICATIONS_PAGE -->
            <div class="settings-item" data-setting="notifications">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-bell"></i>
                    </div>
                    <div class="settings-label-text">Notifications</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 10. Irreversible Delete Account Action Row -->
            <!-- LINK SLOT: SLOT_DELETE_ACCOUNT_PAGE_OR_MODAL -->
            <div class="settings-item" data-setting="delete-account">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-trash"></i>
                    </div>
                    <div class="settings-label-text">Delete Account</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 11. Help & Support Row -->
            <!-- LINK SLOT: SLOT_HELP_SUPPORT_PAGE -->
            <div class="settings-item" data-setting="help-support">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-headphones"></i>
                    </div>
                    <div class="settings-label-text">Help & Support</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 12. About Specifications Row Info -->
            <!-- LINK SLOT: SLOT_ABOUT_PAGE -->
            <div class="settings-item" data-setting="about">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-info"></i>
                    </div>
                    <div class="settings-label-text">About</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <!-- 13. Logout Action -->
            <div class="settings-item" data-setting="logout">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-sign-out"></i>
                    </div>
                    <div class="settings-label-text">Logout</div>
                </div>
                <div class="settings-chevron">
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

        </div>
    </div>

    <!-- ==========================================
       BOTTOM PINNED GLOBAL TAB MENU LAYOUT
    ========================================== -->
    <div class="bottom-nav">
        <div class="nav-item tab-trigger" data-route="home" onclick="window.location.href='home.html'">
            <i class="ph ph-house"></i>
            <span>Home</span>
        </div>

        <div class="nav-item tab-trigger" data-route="messages" onclick="window.location.href='message.html'">
            <i class="ph ph-chats-circle"></i>
            <span>Messages</span>
        </div>

        <div class="nav-item tab-trigger" data-route="add" onclick="window.location.href='add.html'">
            <i class="ph ph-plus-circle"></i>
            <span>Add</span>
        </div>

        <div class="nav-item tab-trigger" data-route="saved" onclick="window.location.href='saved.html'">
            <i class="ph ph-bookmark-simple"></i>
            <span>Saved</span>
        </div>

        <div class="nav-item tab-trigger" data-route="settings" onclick="window.location.href='settings.html'">
            <i class="ph ph-gear"></i>
            <span>Settings</span>
        </div>

    </div>

</div>

<script>
    // Set active nav item based on current page
    function setActiveNav() {
        const currentPage = window.location.pathname.split('/').pop() || 'settings.html';
        const navItems = document.querySelectorAll('.nav-item[data-route]');
        navItems.forEach(item => item.classList.remove('active'));
        
        const routeMap = {
            'add.html': 'add',
            'saved.html': 'saved',
            'home.html': 'home',
            'message.html': 'messages',
            'settings.html': 'settings'
        };
        
        const currentRoute = routeMap[currentPage];
        if(currentRoute) {
            const activeItem = document.querySelector(`.nav-item[data-route="${currentRoute}"]`);
            if(activeItem) activeItem.classList.add('active');
        }
    }
    
    window.addEventListener('load', setActiveNav);

    /* ==========================================
       SETTINGS LIST SUB-ROW INTERACTION HANDLERS 
    ========================================== */
    document.querySelectorAll('.settings-item').forEach(item => {
        item.addEventListener('click', function() {
            const settingId = this.getAttribute('data-setting');
            
            switch(settingId) {
                case 'profile':
                    window.location.href = 'account.html';
                    break;
                case 'my-ads':
                    window.location.href = 'ads.html';
                    break;
                case 'email':
                    console.log("Trigger security notification email modification stream.");
                    break;
                case 'telephone':
                    console.log("Trigger telephone account linkage view controller.");
                    break;
                case 'verification':
                    console.log("Trigger verification credential document flow.");
                    break;
                case 'payments':
                    console.log("Trigger financial hub/gateway settings interaction.");
                    break;
                case 'password':
                    console.log("Trigger change credential input matrix window.");
                    break;
                case 'language':
                    window.location.href = 'language.html';
                    break;
                case 'notifications':
                    window.location.href = 'notification.html';
                    break;
                case 'delete-account':
                    window.location.href = 'delete account.html';
                    break;
                case 'help-support':
                    window.location.href = 'help & support.html';
                    break;
                case 'about':
                    window.location.href = 'about.html';
                    break;
                case 'logout':
                    window.location.href = 'logout.html';    
                default:
                    break;
            }
        });
    });


    
    document.addEventListener('DOMContentLoaded', () => {
        const STORAGE_KEY = "OPEN_USER_RECORDS";
        const SESSION_KEY = "OPEN_ACTIVE_SESSION";

        const session = JSON.parse(localStorage.getItem(SESSION_KEY));
        const users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        if (session) {
        const currentUser = users.find(u => u.email === session.email);
            if (currentUser) {
                // Find the span/h1 where the name is displayed
                // Update this ID to match your settings name element
                const nameDisplay = document.getElementById('settings-name');
                if (nameDisplay) {
                nameDisplay.innerText = currentUser.name;
                }
            }
        }
    });

</script>
</body>
</html>
