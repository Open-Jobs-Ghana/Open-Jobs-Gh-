<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>Open Jobs Ghana | Theme Settings</title>
    <style>
        /* ==========================================
           THEME CONFIGURATION VARIABLES
           ========================================== */
        :root {
            --body-bg: #F9FAFB;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --border-color: #F3F4F6;
            --input-bg: #FBF9FE;
            --brand-primary: #500E8C;
            --text-muted: #6B7280;
            --shadow-color: rgba(0,0,0,0.02);
        }

        .dark-theme {
            --body-bg: #120e22;
            --card-bg: #1b1635;
            --text-main: #f3f4f6;
            --border-color: rgba(255, 255, 255, 0.12);
            --input-bg: #231e42;
            --brand-primary: #9d4edd; /* Slightly brighter purple for dark mode visibility */
            --text-muted: #9ca3af;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * { 
            box-sizing: border-box;
            margin: 0; 
            padding: 0; 
        }
        
        body {
            width: 100%; 
            height: 100dvh;
            background-color: var(--body-bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            align-items: flex-start;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #app-container {
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column;
            background: var(--card-bg);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        /* Top Header Component with Back Arrow Navigation */
        .header-nav {
            padding: 30px 24px 15px;
            display: flex; 
            align-items: center;
            gap: 16px;
            background: var(--card-bg); 
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--brand-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: transform 0.2s ease;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        .back-btn i {
            font-size: 24px;
            font-weight: bold;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700; 
            color: var(--brand-primary);
        }

        /* Layout Container */
        .main-content {
            flex: 1;
            overflow-y: auto; 
            padding: 20px 0;
            width: 100%; 
            -webkit-overflow-scrolling: touch;
            padding-bottom: 160px;
        }

        /* Selection Options Grid wrapper */
        .settings-list-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 8px 0;
            box-shadow: 0 4px 20px var(--shadow-color);
            border: 1px solid var(--border-color);
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            cursor: pointer;
            transition: background-color 0.15s ease;
            background: var(--card-bg);
        }

        .settings-item:not(:last-child) {
            border-bottom: 1px solid var(--border-color);
        }

        .settings-item:hover {
            background-color: var(--input-bg);
        }

        .settings-item-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .settings-icon-box {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand-primary);
        }

        .settings-icon-box i {
            font-size: 24px;
        }

        .settings-label-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--brand-primary);
        }

        /* Check Circle Activation State Indicator */
        .theme-status-indicator {
            color: var(--brand-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .theme-status-indicator i {
            font-size: 22px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Inactive states hides specific check styles cleanly */
        .settings-item:not(.active) .theme-status-indicator i {
            opacity: 0.2;
            color: var(--text-muted);
        }

        .settings-item.active .theme-status-indicator i {
            transform: scale(1.1);
        }

        /* ==========================================
           BOTTOM PINNED GLOBAL TAB MENU LAYOUT
        ========================================== */
        .bottom-nav {
            position: absolute;
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 80px;
            background: var(--card-bg); 
            border-top: 1px solid var(--border-color); 
            display: flex;
            align-items: center; 
            justify-content: space-around;
            z-index: 10;
            box-shadow: 0 -4px 10px var(--shadow-color); 
            padding: 0 40px;
        }

        .nav-item {
            display: flex;
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            color: var(--text-muted); 
            font-size: 13px; 
            font-weight: 500; 
            text-decoration: none; 
            cursor: pointer;
            width: 100px;
            padding: 8px 0;
        }

        .nav-item.active { 
            color: var(--brand-primary); 
            font-weight: 600;
        }
        
        .bottom-nav .nav-item i {
            font-size: 26px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            margin-bottom: 2px;
        }

        .bottom-nav .nav-item.active i {
            font-size: 32px;
            color: var(--brand-primary);
        }
            
        .bottom-nav .nav-item span {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .bottom-nav .nav-item.active span {
            color: var(--brand-primary);
        }

        /* Mobile Breakdowns */
        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .settings-list-container { max-width: 100%; border-radius: 12px; }
            .settings-item { padding: 16px; }
            .bottom-nav { padding: 0; height: 72px; }
            .nav-item { font-size: 11px; width: auto; }
        }
    </style>
</head>
<body>

<div id="app-container">

    <div class="header-nav">
        <button class="back-btn" onclick="window.location.href='settings.html'" aria-label="Go Back">
            <i class="ph ph-caret-left"></i>
        </button>
        <div class="header-title">Theme</div>
    </div>

    <div class="main-content">
        <div class="settings-list-container">
            
            <div class="settings-item" id="theme-light-btn" data-theme-target="light">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-sun"></i>
                    </div>
                    <div class="settings-label-text">Light Mode</div>
                </div>
                <div class="theme-status-indicator">
                    <i class="ph ph-check-circle"></i>
                </div>
            </div>

            <div class="settings-item" id="theme-dark-btn" data-theme-target="dark">
                <div class="settings-item-left">
                    <div class="settings-icon-box">
                        <i class="ph ph-moon"></i>
                    </div>
                    <div class="settings-label-text">Dark Mode</div>
                </div>
                <div class="theme-status-indicator">
                    <i class="ph ph-check-circle"></i>
                </div>
            </div>

        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item tab-trigger" onclick="window.location.href='home.html'">
            <i class="ph ph-house"></i>
            <span>Home</span>
        </div>

        <div class="nav-item tab-trigger" onclick="window.location.href='message.html'">
            <i class="ph ph-chats-circle"></i>
            <span>Messages</span>
        </div>

        <div class="nav-item tab-trigger" onclick="window.location.href='add.html'">
            <i class="ph ph-plus-circle"></i>
            <span>Add</span>
        </div>

        <div class="nav-item tab-trigger" onclick="window.location.href='saved.html'">
            <i class="ph ph-bookmark-simple"></i>
            <span>Saved</span>
        </div>

        <div class="nav-item tab-trigger active" onclick="window.location.href='settings.html'">
            <i class="ph ph-gear"></i>
            <span>Settings</span>
        </div>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const lightBtn = document.getElementById('theme-light-btn');
        const darkBtn = document.getElementById('theme-dark-btn');

        // 1. Check current system state preference and assign class active layers
        const currentSavedTheme = localStorage.getItem('theme') || 'light';
        
        if (currentSavedTheme === 'dark') {
            darkBtn.classList.add('active');
        } else {
            lightBtn.classList.add('active');
        }

        // 2. Action Logic to change theme immediately
        function setThemeSelection(selectedTheme) {
            if (selectedTheme === 'dark') {
                document.documentElement.classList.add('dark-theme');
                lightBtn.classList.remove('active');
                darkBtn.classList.add('active');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark-theme');
                darkBtn.classList.remove('active');
                lightBtn.classList.add('active');
                localStorage.setItem('theme', 'light');
            }
        }

        // Event triggers
        lightBtn.addEventListener('click', () => setThemeSelection('light'));
        darkBtn.addEventListener('click', () => setThemeSelection('dark'));
    });
</script>
</body>
</html>
