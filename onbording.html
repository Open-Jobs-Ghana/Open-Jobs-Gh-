<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
      <title>Open Jobs Ghana | Onboarding page</title>
      <style>
            body.onboarding-page {
                  margin: 0;
                  min-height: 100vh;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  background: #F6ECEA;
                  font-family: 'Poppins', sans-serif;
                  padding: 16px;
            }

            .section {
                  width: min(100%, 460px);
                  text-align: center;
                  background: #F6ECEA;
                  border-radius: 28px;
                  padding: 28px 24px;
                  box-shadow: none;
            }

            .section h1 {
                  margin: 0 0 16px;
                  font-size: 24px;
                  font-weight: 600;
                  letter-spacing: 0.1em;
                  color: rgb(18, 17, 17);
            }

            .section p {
                  margin: 0 0 28px;
                  font-size: 16px;
                  line-height: 1.75;
                  color: #3f3f46;
            }

            .onboard-image {
                  width: 100%;
                  max-width: 360px;
                  display: block;
                  margin: 0 auto 24px;
                  border-radius: 24px;
                  object-fit: cover;
            }

            .progress-dots {
                  display: flex;
                  justify-content: center;
                  gap: 10px;
                  margin-bottom: 24px;
            }

            .progress-dot {
                  width: 12px;
                  height: 12px;
                  border-radius: 50%;
                  background: #ffffff;
                  border: 1px solid #c8c3c0;
                  cursor: pointer;
                  transition: all 0.3s ease;
            }

            .progress-dot.active {
                  background: #500E8C;
                  border-color: #500E8C;
                  transform: scale(1.2);
            }

            .progress-dot.visited {
                  background: #500E8C;
                  border-color: #500E8C;
            }

            .progress-dot.unvisited {
                  background: #ffffff;
                  border-color: #c8c3c0;
                  cursor: default;
            }

            .options-container {
                  display: flex;
                  flex-direction: column;
                  gap: 12px;
                  margin-bottom: 24px;
            }

            .option-card {
                  padding: 16px;
                  border: 2px solid #e5e5e5;
                  border-radius: 110px;
                  background: #ffffff;
                  color: #500E8C;
                  font-size: 16px;
                  font-weight: 500;
                  cursor: pointer;
                  transition: all 0.3s ease;
                  text-align: center;
            }

            .option-card:hover {
                  border-color: #500E8C;
                  background: #f8f5ff;
            }

            .option-card.selected {
                  background: #500E8C;
                  color: #ffffff;
                  border-color: #500E8C;
            }

            .section button:disabled {
                  background: #cccccc;
                  cursor: not-allowed;
                  box-shadow: none;
            }

            .section button {
                  width: 100%;
                  max-width: 260px;
                  border: none;
                  border-radius: 28px;
                  background: #500E8C;
                  color: #ffffff;
                  padding: 16px 24px;
                  font-size: 16px;
                  font-weight: 600;
                  cursor: pointer;
                  box-shadow: 0 4px 12px rgba(80, 14, 140, 0.25);
            }

            .button-group {
                  display: flex;
                  gap: 12px;
                  justify-content: center;
                  margin-top: 8px;
            }

            .button-group button {
                  flex: 1;
                  min-width: 0;
            }

            #backBtn {
                  background: #500E8C;
                  color: #ffffff;
                  display: none;
            }

            #nextBtn {
                  width: auto;
            }

            #backBtn:active,
            #nextBtn:active {
                  background: rgb(50, 5, 80);
            }

            /* Mobile Devices */
            @media (max-width: 480px) {
                  body.onboarding-page { padding: 12px; }
                  .section { padding: 20px 16px; border-radius: 20px; }
                  .section h1 { font-size: 20px; margin-bottom: 12px; }
                  .section p { font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
                  .progress-dots { gap: 8px; margin-bottom: 16px; }
                  .progress-dot { width: 10px; height: 10px; }
                  .section button { padding: 12px 16px; font-size: 14px; border-radius: 24px; }
                  .button-group { gap: 8px; margin-top: 6px; }
            }

            /* Tablets */
            @media (min-width: 481px) and (max-width: 768px) {
                  body.onboarding-page { padding: 20px; }
                  .section { padding: 32px 28px; border-radius: 24px; }
                  .section h1 { font-size: 22px; margin-bottom: 14px; }
                  .section p { font-size: 15px; margin-bottom: 24px; }
                  .button-group { gap: 12px; }
            }

            /* Desktop and Larger */
            @media (min-width: 769px) {
                  body.onboarding-page { padding: 24px; }
                  .section { width: 100%; max-width: 520px; padding: 40px 36px; border-radius: 32px; }
                  .section h1 { font-size: 26px; margin-bottom: 18px; }
                  .section p { font-size: 17px; line-height: 1.8; margin-bottom: 32px; }
                  .progress-dots { gap: 12px; margin-bottom: 28px; }
                  .progress-dot { width: 14px; height: 14px; }
                  .section button { padding: 18px 28px; font-size: 17px; border-radius: 30px; }
                  .button-group { gap: 16px; margin-top: 12px; }
            }
      </style>
</head>
<body class="onboarding-page">
      <div class="section">
            <img src="icons/onbord.jpg" alt="Onboarding illustration" class="onboard-image">
            <div class="progress-dots" id="progressDotsContainer" aria-label="Onboarding progress"></div>

            <h1 id="pageTitle">Hey there!</h1>
            <p id="pageText">Loading setup details...</p>

            <div id="optionsContainer" class="options-container"></div>

            <div class="button-group">
                  <button id="backBtn">Back</button>
                  <button id="nextBtn">Next</button>
            </div>
      </div>

      <script>
            // Step definitions across branches
            const commonBasePages = [
                  {
                        id: 'welcome',
                        title: 'Hey there!',
                        text: 'We\'re excited to have you here. Before we get into the career opportunities waiting for you, we just need a few quick details to personalize your journey. Ready to find your next big move? Tap Next to get started! 🚀'
                  },
                  {
                        id: 'attribution',
                        title: 'How did you find out about OPEN?',
                        options: [
                              { value: "Family or Friend", label: "Family or friend" },
                              { value: "Flyer", label: "Flyer/ ad /post" },
                              { value: "Social media", label: "Social media" },
                              { value: "Google search", label: "Google search/AI search" },
                              { value: "Other", label: "Other" }
                        ]
                  },
                  {
                        id: 'role_selection',
                        title: 'What brings you here today?',
                        options: [
                              { value: "Jobseeker", label: "I am a Jobseeker" },
                              { value: "Business Owner", label: "I am a Business owner" },
                              { value: "Freelancer", label: "I am a Freelancer" },
                              { value: "Internship Seeker", label: "I am looking for internship opportunities" }
                        ]
                  }
            ];

            const tracks = {
                  "Jobseeker": [
                        {
                              id: 'js_field',
                              title: 'Which field are you most interested in?',
                              options: [
                                    { value: "Healthcare", label: "Healthcare" },
                                    { value: "Business or Finance", label: "Business or Finance" },
                                    { value: "Agriculture", label: "Agriculture" },
                                    { value: "Engineering", label: "Engineering" },
                                    { value: "Transport", label: "Transport" },
                                    { value: "Other", label: "Other" }
                              ]
                        },
                        {
                              id: 'js_workspace',
                              title: 'Where would you prefer to work?',
                              options: [
                                    { value: "Physical Workplace", label: "Physical Workplace" },
                                    { value: "Remotely", label: "Remotely (online or from home)" }
                              ]
                        },
                        {
                              id: 'js_level',
                              title: 'What\'s your current professional level?',
                              options: [
                                    { value: "Entry level", label: "Entry level" },
                                    { value: "Middle level", label: "Middle level" },
                                    { value: "Senior level", label: "Senior level" }
                              ]
                        }
                  ],
                  "Internship Seeker": [
                        {
                              id: 'intern_field',
                              title: 'Which industry are you looking to intern in?',
                              options: [
                                    { value: "Healthcare", label: "Healthcare" },
                                    { value: "Business or Finance", label: "Business or Finance" },
                                    { value: "Agriculture", label: "Agriculture" },
                                    { value: "Engineering", label: "Engineering" },
                                    { value: "Tech", label: "Technology / IT" },
                                    { value: "Other", label: "Other" }
                              ]
                        },
                        {
                              id: 'intern_type',
                              title: 'What type of internship are you targetting?',
                              options: [
                                    { value: "Physical", label: "On-site / Physical" },
                                    { value: "Remote", label: "Remote Internship" }
                              ]
                        },
                        {
                              id: 'intern_status',
                              title: 'What is your current status?',
                              options: [
                                    { value: "Student", label: "Current Student" },
                                    { value: "Graduate", label: "Recent Graduate" },
                                    { value: "Career Changer", label: "Career Changer" }
                              ]
                        }
                  ],
                  "Business Owner": [
                        {
                              id: 'biz_size',
                              title: 'What is the scale of your business?',
                              options: [
                                    { value: "Solo", label: "Solo Founder / Micro Enterprise" },
                                    { value: "Small", label: "2 - 10 Employees" },
                                    { value: "Medium", label: "11 - 50 Employees" },
                                    { value: "Large", label: "50+ Employees" }
                              ]
                        },
                        {
                              id: 'biz_sector',
                              title: 'Which sector does your business operate in?',
                              options: [
                                    { value: "Agriculture", label: "Agriculture" },
                                    { value: "Commerce", label: "Retail / Commerce" },
                                    { value: "Tech", label: "Technology & Software" },
                                    { value: "Hospitality", label: "Hospitality & Tourism" },
                                    { value: "Other", label: "Other Domain" }
                              ]
                        },
                        {
                              id: 'biz_need',
                              title: 'What talent do you need to find first?',
                              options: [
                                    { value: "Full-Time", label: "Permanent Full-time Workers" },
                                    { value: "Freelancers", label: "Project Contractors / Freelancers" },
                                    { value: "Interns", label: "Short-term Interns" }
                              ]
                        }
                  ],
                  "Freelancer": [
                        {
                              id: 'free_skill',
                              title: 'What is your primary freelance domain?',
                              options: [
                                    { value: "Development", label: "Software / Web Development" },
                                    { value: "Design", label: "Graphic Design / Creative Media" },
                                    { value: "Finance", label: "Accounting, Legal or Tax" },
                                    { value: "Writing", label: "Content Writing & Marketing" },
                                    { value: "Other", label: "Other Professional Service" }
                              ]
                        },
                        {
                              id: 'free_load',
                              title: 'What is your structural work availability?',
                              options: [
                                    { value: "Full-Time", label: "Available Full-Time for Gigs" },
                                    { value: "Part-Time", label: "Part-Time / Side-Hustle Only" }
                              ]
                        },
                        {
                              id: 'free_billing',
                              title: 'How do you typically bill your clients?',
                              options: [
                                    { value: "Hourly", label: "Hourly Billing Rates" },
                                    { value: "Project", label: "Fixed Project Milestones" },
                                    { value: "Retainer", label: "Monthly Retainer Agreements" }
                              ]
                        }
                  ]
            };

            const endPage = {
                  id: 'hooray',
                  title: '🎉 Hooray!',
                  text: 'You are all done. Now all you need to do is explore the app to find and secure the best talent or job for yourself.'
            };

            // Global State Engine
            let currentIndex = 0;
            let maxVisited = 0;
            const selections = {};

            const pageTitle = document.getElementById('pageTitle');
            const pageText = document.getElementById('pageText');
            const nextBtn = document.getElementById('nextBtn');
            const backBtn = document.getElementById('backBtn');
            const optionsContainer = document.getElementById('optionsContainer');
            const progressDotsContainer = document.getElementById('progressDotsContainer');

            // Evaluates and merges the dynamic sequence steps based on current choice context
            function buildActivePagesArray() {
                  const currentPages = [...commonBasePages];
                  const chosenRole = selections['role_selection'];
                  
                  if (chosenRole && tracks[chosenRole]) {
                        currentPages.push(...tracks[chosenRole]);
                  }
                  currentPages.push(endPage);
                  return currentPages;
            }

            function updateButtons(activePages) {
                  const currentPageObject = activePages[currentIndex];
                  const hasSelection = !currentPageObject.options || selections[currentPageObject.id];
                  nextBtn.disabled = !hasSelection;
            }

            function buildProgressDots(activePages) {
                  progressDotsContainer.innerHTML = '';
                  activePages.forEach((_, index) => {
                        const dot = document.createElement('span');
                        dot.className = 'progress-dot';
                        
                        if (index === currentIndex) {
                              dot.classList.add('active');
                        } else if (index <= maxVisited) {
                              dot.classList.add('visited');
                              dot.addEventListener('click', () => {
                                    currentIndex = index;
                                    updatePage();
                              });
                        } else {
                              dot.classList.add('unvisited');
                        }
                        progressDotsContainer.appendChild(dot);
                  });
            }

            function updatePage() {
                  const activePages = buildActivePagesArray();
                  const currentPageObject = activePages[currentIndex];

                  // Safeguard index mismatch if paths change abruptly
                  if (!currentPageObject) {
                        currentIndex = activePages.length - 1;
                        updatePage();
                        return;
                  }

                  // Build steps tracking dots
                  buildProgressDots(activePages);

                  // Update strings
                  pageTitle.textContent = currentPageObject.title;
                  pageText.textContent = currentPageObject.text || '';

                  // Show visual asset layout only on home hero frame
                  const onboardImage = document.querySelector('.onboard-image');
                  onboardImage.style.display = currentIndex === 0 ? 'block' : 'none';

                  // Render contextual options components
                  optionsContainer.innerHTML = '';
                  if (currentPageObject.options) {
                        currentPageObject.options.forEach(option => {
                              const card = document.createElement('div');
                              card.className = 'option-card';
                              card.textContent = option.label;
                              card.dataset.value = option.value;

                              if (selections[currentPageObject.id] === option.value) {
                                    card.classList.add('selected');
                              }

                              card.addEventListener('click', () => {
                                    optionsContainer.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                                    card.classList.add('selected');
                                    
                                    const oldSelection = selections[currentPageObject.id];
                                    selections[currentPageObject.id] = option.value;

                                    // Clear path memory if role selection shifts
                                    if (currentPageObject.id === 'role_selection' && oldSelection !== option.value) {
                                          maxVisited = currentIndex;
                                          Object.keys(selections).forEach(key => {
                                                if(key !== 'welcome' && key !== 'attribution' && key !== 'role_selection') {
                                                      delete selections[key];
                                                }
                                          });
                                    }

                                    updateButtons(activePages);
                              });
                              optionsContainer.appendChild(card);
                        });
                  }

                  // Establish standard layout pagination operations buttons UI
                  backBtn.style.display = currentIndex > 0 ? 'block' : 'none';
                  if (currentIndex === activePages.length - 1) {
                        nextBtn.textContent = 'Continue';
                  } else {
                        nextBtn.textContent = 'Next';
                  }

                  updateButtons(activePages);
            }

            nextBtn.addEventListener('click', () => {
                  const activePages = buildActivePagesArray();
                  const currentPageObject = activePages[currentIndex];

                  if (currentIndex === activePages.length - 1) {
                        // Persist onboarding results inside browser context
                        localStorage.setItem('open_user_role', selections['role_selection'] || 'Exploring');
                        localStorage.setItem('open_onboarding_data', JSON.stringify(selections));

                        // Security requirement: signing up does not log the
                        // user in (see api.js registerUser). Onboarding ends
                        // by sending them to sign in for real, rather than
                        // straight into the app.
                        window.location.href = 'login.html?newAccount=1';
                  } else if (currentIndex < activePages.length - 1 && (!currentPageObject.options || selections[currentPageObject.id])) {
                        currentIndex += 1;
                        maxVisited = Math.max(maxVisited, currentIndex);
                        updatePage();
                  }
            });

            backBtn.addEventListener('click', () => {
                  if (currentIndex > 0) {
                        currentIndex -= 1;
                        updatePage();
                  }
            });

            // Run application initialize engine core
            updatePage();
      </script>
</body>
</html>
