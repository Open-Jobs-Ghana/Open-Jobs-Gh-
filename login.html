<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Open Jobs Ghana | Log In</title>
</head>
<body>
  <div class="login-page">
    <form class="login-card" action="#" method="post">
      <div class="brand-header">
        <img src="icons/Open Logo.png" alt="Open logo" class="brand-logo">
        <h1>OPEN</h1>
      </div>
      <p class="subtitle">Open for work. Open for growth</p>

      <input id="email" type="email" name="email" placeholder="Email Address" required>

      <input id="password" type="password" name="password" placeholder="Password" required>
      <div class="error-message" id="passwordError">
        ❌ Password must start with capital letter, contain special character (@#$%!&*), and end with 1-2 numbers
      </div>

      <button type="submit" class="primary-btn"><a href="index.html"></a>Sign In</button>

      <div class="divider"><span>or continue with:</span></div>

      <div class="social-options">
        <button type="button" class="social-btn"><img src="icons/google icon.svg" alt="Google"></button>
        <button type="button" class="social-btn"><img src="icons/Email Icon.svg" alt="Email"></button>
        <button type="button" class="social-btn"><img src="icons/Phone Icon.svg" alt="Phone"></button>
      </div>

      <p class="switch-text">Don't already have an account? <a href="signup.html">Sign Up</a></p>
    </form>
  </div>
</body>
<script>
 
document.addEventListener('DOMContentLoaded', function() {
  // Find all password inputs
  const passwordInputs = document.querySelectorAll('input[type="password"]');
  
  passwordInputs.forEach((input, index) => {
    // Create wrapper div
    const wrapper = document.createElement('div');
    wrapper.className = 'password-wrapper';
    
    // Wrap the input
    input.parentNode.insertBefore(wrapper, input);
    wrapper.appendChild(input);
    
    // Create toggle button
    const toggleBtn = document.createElement('button');
    toggleBtn.type = 'button';
    toggleBtn.className = 'toggle-password';
    toggleBtn.setAttribute('aria-label', 'Show password');
    toggleBtn.innerHTML = '<img src="icons/eye.png" alt="Show password">';
    
    wrapper.appendChild(toggleBtn);
    
    // Add click handler
    toggleBtn.addEventListener('click', function() {
      const type = input.type === 'password' ? 'text' : 'password';
      input.type = type;
      const iconSrc = type === 'password' ? 'icons/eye.png' : 'icons/invisible.png';
      const ariaLabel = type === 'password' ? 'Show password' : 'Hide password';
      this.setAttribute('aria-label', ariaLabel);
      this.innerHTML = `<img src="${iconSrc}" alt="${ariaLabel}">`;
    });
  });
});



// Password validation function
  function validatePassword(password) {
    return (
      /^[A-Z]/.test(password) &&           // Starts with capital letter
      /[@#$%!&*]/.test(password) &&        // Contains special character
      /[0-9]{1,2}$/.test(password) &&      // Ends with 1-2 numbers
      password.length >= 8                  // Minimum length
    );
  }
  
  const form = document.getElementById('loginForm');
  const passwordInput = document.getElementById('password');
  const errorMessage = document.getElementById('passwordError');
  
  // Sow errors when user types  
  passwordInput.addEventListener('input', function() {
    const password = this.value;
    
    if (password && !validatePassword(password)) {
      this.classList.add('invalid');
      errorMessage.style.display = 'block';
    } else {
      this.classList.remove('invalid');
      errorMessage.style.display = 'none';
    }
  });
  
  // Form submission validation
  form.addEventListener('submit', function(e) {
    const password = passwordInput.value;
    
    if (!validatePassword(password)) {
      e.preventDefault(); // STOP form submission
      errorMessage.style.display = 'block';
      passwordInput.classList.add('invalid');
      passwordInput.focus();
      return false;
    }
    
    // If we get here, password is valid
    // You would normally check against database here
    alert('✅ Password format valid! Checking credentials...');
    
    e.preventDefault();
  });
</script>
</html>
