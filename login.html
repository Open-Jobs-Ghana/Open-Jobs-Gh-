<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Open Jobs Ghana | Log In</title>
</head>
<body>
  <div class="login-page">
    <form class="login-card" action="#" method="post" id="loginForm">
      <div class="brand-header">
        <img src="icons/Open Logo.png" alt="Open logo" class="brand-logo">
        <h1>OPEN</h1>
      </div>
      <p class="subtitle">Open for work. Open for growth</p>

      <input id="email" type="email" name="email" placeholder="Email Address" required>

      <input id="password" type="password" name="password" placeholder="Password" required>
      
      <div class="error-message" id="accountError" style="display: none; color: red; margin-top: 10px; font-weight: 500;">
        ❌ Sorry, account does not exist
      </div>

      <button type="submit" class="primary-btn">Sign In</button>

      <div class="divider"><span>or continue with:</span></div>

      <div class="social-options">
        <button type="button" class="social-btn"><img src="icons/google icon.svg" alt="Google"></button>
        <button type="button" class="social-btn"><img src="icons/Email Icon.svg" alt="Email"></button>
        <button type="button" class="social-btn"><img src="icons/Phone Icon.svg" alt="Phone"></button>
      </div>

      <p class="switch-text">Don't already have an account? <a href="signup.html">Sign Up</a></p>
    </form>
  </div>
</body>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Find all password inputs and set up eye toggle icons
  const passwordInputs = document.querySelectorAll('input[type="password"]');
  
  passwordInputs.forEach((input, index) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'password-wrapper';
    
    input.parentNode.insertBefore(wrapper, input);
    wrapper.appendChild(input);
    
    const toggleBtn = document.createElement('button');
    toggleBtn.type = 'button';
    toggleBtn.className = 'toggle-password';
    toggleBtn.setAttribute('aria-label', 'Show password');
    toggleBtn.innerHTML = '<img src="icons/eye.png" alt="Show password">';
    
    wrapper.appendChild(toggleBtn);
    
    toggleBtn.addEventListener('click', function() {
      const type = input.type === 'password' ? 'text' : 'password';
      input.type = type;
      const iconSrc = type === 'password' ? 'icons/eye.png' : 'icons/invisible.png';
      const ariaLabel = type === 'password' ? 'Show password' : 'Hide password';
      this.setAttribute('aria-label', ariaLabel);
      this.innerHTML = `<img src="${iconSrc}" alt="${ariaLabel}">`;
    });
  });
  
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const accountErrorMessage = document.getElementById('accountError');

  // Clear error notes dynamically while typing a new attempt
  passwordInput.addEventListener('input', function() {
    this.classList.remove('invalid');
    accountErrorMessage.style.display = 'none';
  });

  emailInput.addEventListener('input', function() {
    passwordInput.classList.remove('invalid');
    accountErrorMessage.style.display = 'none';
  });

  // Form submission handling logic
  if (form) {
    form.addEventListener('submit', function(e) {
      e.preventDefault(); // STOP automatic form processing
      
      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;
      
      // Reset layout configurations
      accountErrorMessage.style.display = 'none';
      passwordInput.classList.remove('invalid');

      // Fetch existing system database records
      const STORAGE_KEY = "OPEN_USER_RECORDS";
      const SESSION_KEY = "OPEN_ACTIVE_SESSION";
      const users = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      
      // Step 1: Verify if the email exists at all
      const userExists = users.find(user => user.email === email);
      
      if (!userExists) {
        // Condition A: Email is nowhere to be found
        accountErrorMessage.innerText = "❌ Sorry, account does not exist";
        accountErrorMessage.style.display = 'block';
        return false;
      }
      
      // Step 2: Email exists, now evaluate the password
      if (userExists.password !== password) {
        // Condition B: Email is valid but password fails matching criteria
        accountErrorMessage.innerText = "❌ Incorrect password";
        accountErrorMessage.style.display = 'block';
        passwordInput.classList.add('invalid');
        passwordInput.focus();
        return false;
      }
      
      // Step 3: Success authentication state mapping
      localStorage.setItem(SESSION_KEY, JSON.stringify({ email: email }));
      window.location.href = 'home.html';
    });
  }
});

if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark-theme');
}
</script>
</html>
